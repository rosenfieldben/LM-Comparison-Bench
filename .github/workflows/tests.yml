name: tests

# Actions are pinned to commit SHAs: tags are mutable, and a
# compromised tag runs arbitrary code in CI with repo access.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      # Both ends of the supported range, so the README's version floor
      # is a tested claim rather than an aspiration.
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: pytest

  # The every-merge gate for the frontend: the critical-path suite in
  # tests/browser drives the real app in headless Chromium against a
  # stub upstream, so a frontend change must prove the critical path
  # still works. One Python version is enough; the browser, not the
  # interpreter, is what this job exercises.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Cache Playwright browser binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.61.0
      - run: playwright install --with-deps chromium
      - run: pytest -m browser -q
