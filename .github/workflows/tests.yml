name: tests

# Actions are pinned to commit SHAs: tags are mutable, and a
# compromised tag runs arbitrary code in CI with repo access.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Static gate: format, lint, and strict types on the backend. One
  # interpreter is enough; these tools are version-agnostic here.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy bench

  tests:
    runs-on: ubuntu-latest
    strategy:
      # The supported floor plus the newer interpreters. 3.13 and 3.14
      # ship cp3xx wheels for the one compiled pin (pydantic-core), and
      # everything else is pure Python.
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: pytest

  # Pure-function frontend tests. static/lib.js is DOM-free and has a
  # CommonJS guard, so node requires it directly: no build step, no npm
  # install, no dependencies.
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - run: node --test "tests/js/**/*.test.js"

  # The every-merge gate for the frontend: the critical-path suite in
  # tests/browser drives the real app in headless Chromium against a
  # stub upstream, so a frontend change must prove the critical path
  # still works. One Python version is enough; the browser, not the
  # interpreter, is what this job exercises.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Cache Playwright browser binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.61.0
      - run: playwright install --with-deps chromium
      - run: pytest -m browser -q
