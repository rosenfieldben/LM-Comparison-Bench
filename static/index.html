<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LM Comparison Bench</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #fafaf8;
    color: #222;
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  h1 { font-size: 1.3rem; margin: 0 0 1rem; }
  #prompt {
    width: 100%;
    font: inherit;
    padding: 0.6rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
  }
  #models {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.2rem;
    margin: 0.8rem 0;
  }
  #models label { cursor: pointer; font-size: 0.95rem; }
  #run {
    font: inherit;
    padding: 0.5rem 1.6rem;
    border: 1px solid #888;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  #run:disabled { opacity: 0.45; cursor: default; }
  #run-bar { display: flex; gap: 0.6rem; align-items: center; }
  #budget {
    font: inherit;
    font-size: 0.9rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid #aaa;
    border-radius: 6px;
    background: #fff;
  }
  #results {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.2rem;
    align-items: stretch;
  }
  .col {
    /* Equal-width columns regardless of content, so 2 to 5 all line up. */
    flex: 1 1 0;
    min-width: 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    padding: 0.7rem;
  }
  .col.error { background: #fdf3f2; border-color: #d9a09a; }
  .col-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.4rem;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
    word-break: break-all;
  }
  .diff-toggle {
    font: inherit;
    font-size: 0.7rem;
    font-weight: 400;
    padding: 0.05rem 0.45rem;
    border: 1px solid #aaa;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    flex-shrink: 0;
  }
  .diff-toggle.armed { background: #35507a; border-color: #35507a; color: #fff; }
  .rerun-btn {
    font: inherit;
    font-size: 0.7rem;
    font-weight: 400;
    padding: 0.05rem 0.45rem;
    border: 1px solid #b06860;
    border-radius: 4px;
    background: #fff;
    color: #a33;
    cursor: pointer;
    flex-shrink: 0;
  }
  .rerun-btn:disabled { opacity: 0.45; cursor: default; }
  #diff-panel {
    margin-top: 1.2rem;
    border: 1px solid #b8c4d8;
    border-radius: 6px;
    background: #fff;
  }
  #diff-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid #e2e7ef;
    font-size: 0.9rem;
    font-weight: 600;
  }
  #diff-close {
    font: inherit;
    font-size: 0.8rem;
    font-weight: 400;
    padding: 0.15rem 0.6rem;
    border: 1px solid #aaa;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
  }
  #diff-body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
    padding: 0.7rem;
  }
  #diff-body del { background: #fbdcd9; color: #7a1f18; text-decoration: line-through; }
  #diff-body ins { background: #d9f0d9; color: #1c5c1c; text-decoration: none; }
  .meta { margin-bottom: 0.5rem; min-height: 1.3em; }
  .badge {
    display: inline-block;
    font-size: 0.75rem;
    background: #eee;
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    margin-right: 0.4rem;
  }
  .body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .body.loading { color: #999; font-style: italic; }
  .body .error-msg { color: #a33; }
  .body .error-msg.after-text { margin-top: 0.5rem; padding-top: 0.4rem; border-top: 1px dashed #d9a09a; }
  .rm-model {
    font: inherit;
    font-size: 0.8rem;
    line-height: 1;
    padding: 0 0.3rem;
    border: none;
    background: none;
    color: #999;
    cursor: pointer;
  }
  .rm-model:hover { color: #a33; }
  #lineup-bar { display: flex; gap: 0.8rem; align-items: center; margin: 0.4rem 0 0.8rem; }
  #lineup-bar button {
    font: inherit;
    font-size: 0.85rem;
    padding: 0.2rem 0.7rem;
    border: 1px solid #aaa;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  #lineup-msg { font-size: 0.85rem; color: #886a00; }
  #model-search { margin: 0 0 0.8rem; max-width: 720px; }
  #model-search input {
    width: 100%;
    font: inherit;
    font-size: 0.9rem;
    padding: 0.35rem 0.6rem;
    border: 1px solid #aaa;
    border-radius: 6px;
  }
  #search-msg { font-size: 0.85rem; color: #886a00; margin-top: 0.3rem; }
  .match {
    display: flex;
    gap: 0.8rem;
    align-items: baseline;
    padding: 0.35rem 0.4rem;
    border-bottom: 1px solid #eee;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .match:hover { background: #f0efec; }
  .match.dimmed { opacity: 0.45; cursor: default; }
  .match.dimmed:hover { background: none; }
  .match-name { font-weight: 600; white-space: nowrap; }
  .match-id { color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match-meta { color: #555; margin-left: auto; white-space: nowrap; }
  #prompt-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.6rem;
  }
  #prompt-bar select, #prompt-bar button, #prompt-bar input {
    font: inherit;
    font-size: 0.9rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid #aaa;
    border-radius: 6px;
    background: #fff;
  }
  #name-row { display: inline-flex; gap: 0.4rem; }
  #name-row[hidden] { display: none; }
  #prompt-bar button:disabled { opacity: 0.45; }
  #prompt-msg { font-size: 0.85rem; color: #a33; }
  #run-label { margin-top: 1rem; font-size: 0.85rem; color: #888; }
  #history { margin-top: 1.5rem; }
  #history summary { cursor: pointer; color: #555; }
  .hrow {
    display: flex;
    gap: 1rem;
    padding: 0.45rem 0.3rem;
    border-bottom: 1px solid #eee;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .hrow:hover { background: #f0efec; }
  .hrow .htime { color: #888; white-space: nowrap; }
  .hnote { padding: 0.45rem 0.3rem; font-size: 0.8rem; color: #888; font-style: italic; }
  .hrow .hprompt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hrow .hmodels { color: #777; white-space: nowrap; }
</style>
</head>
<body>
<h1>LM Comparison Bench</h1>
<div id="prompt-bar">
  <select id="saved-prompts">
    <option value="">Saved prompts...</option>
  </select>
  <button id="save-prompt" type="button">Save prompt</button>
  <span id="name-row" hidden>
    <input id="prompt-name" type="text" placeholder="Name for this prompt">
    <button id="confirm-save" type="button">OK</button>
    <button id="cancel-save" type="button">Cancel</button>
  </span>
  <button id="delete-prompt" type="button" disabled>Delete</button>
  <span id="prompt-msg"></span>
</div>
<textarea id="prompt" rows="4" placeholder="Prompt to send to every checked model"></textarea>
<div id="models"></div>
<div id="lineup-bar">
  <button id="add-model" type="button">Add model</button>
  <span id="lineup-msg"></span>
</div>
<div id="model-search" hidden>
  <input id="model-query" type="text" placeholder="Search models by name or id">
  <div id="search-msg"></div>
  <div id="model-matches"></div>
</div>
<div id="run-bar">
  <button id="run" disabled>Run</button>
  <select id="budget" title="Completion token budget for every model in the run">
    <option value="standard">standard</option>
    <option value="extended">extended budget</option>
  </select>
</div>
<div id="run-label"></div>
<div id="results"></div>
<div id="diff-panel" hidden>
  <div id="diff-header">
    <span id="diff-title"></span>
    <button id="diff-close" type="button">Close</button>
  </div>
  <div id="diff-body"></div>
</div>
<details id="history">
  <summary>History</summary>
  <div id="history-list"></div>
</details>

<script>
// Seed for a fresh browser only. The live lineup is a localStorage
// preference of THIS browser, not bench data: keeping it out of sqlite
// means bench.db stays purely runs and prompts, and losing it costs
// four clicks.
const DEFAULT_LINEUP = [
  "deepseek/deepseek-chat",
  "z-ai/glm-4.6",
  "mistralai/mistral-small",
  "anthropic/claude-sonnet-4.6",
];
const LINEUP_KEY = "bench-lineup";

function loadLineup() {
  try {
    const parsed = JSON.parse(localStorage.getItem(LINEUP_KEY));
    if (Array.isArray(parsed) && parsed.every(x => typeof x === "string")) {
      return parsed;
    }
  } catch (err) {
    // Unparseable storage falls through to the defaults.
  }
  return [...DEFAULT_LINEUP];
}

let lineup = loadLineup();

function saveLineup() {
  localStorage.setItem(LINEUP_KEY, JSON.stringify(lineup));
}

const promptEl = document.getElementById("prompt");
const modelsEl = document.getElementById("models");
const runBtn = document.getElementById("run");
// Deliberately per-session, never persisted: extended costs real
// money, so the safe default must reassert itself on the next visit.
const budgetSel = document.getElementById("budget");
const resultsEl = document.getElementById("results");
const runLabelEl = document.getElementById("run-label");
const savedSelect = document.getElementById("saved-prompts");
const saveBtn = document.getElementById("save-prompt");
const deleteBtn = document.getElementById("delete-prompt");
const promptMsg = document.getElementById("prompt-msg");
const historyEl = document.getElementById("history");
const historyList = document.getElementById("history-list");
let running = false;
// Sent with /compare so a run links back to its saved prompt. Cleared
// the moment the textarea is edited: the text no longer matches the
// library entry, so the link would lie.
let selectedPromptId = null;

const lineupMsg = document.getElementById("lineup-msg");
const addModelBtn = document.getElementById("add-model");
const searchRow = document.getElementById("model-search");
const queryInput = document.getElementById("model-query");
const searchMsg = document.getElementById("search-msg");
const matchesEl = document.getElementById("model-matches");
// Snapshot of GET /models; fetched=false switches the picker to the
// exact-id fallback so the bench stays usable on an offline boot.
let catalog = { fetched: false, models: [] };

function renderLineup() {
  // Checked state is per-session; carry it across rebuilds so removing
  // one model does not uncheck the others.
  const checked = new Set(checkedModels());
  modelsEl.replaceChildren();
  for (const model of lineup) {
    const label = document.createElement("label");
    const box = document.createElement("input");
    box.type = "checkbox";
    box.value = model;
    box.checked = checked.has(model);
    box.addEventListener("change", updateRunState);
    const rm = document.createElement("button");
    rm.type = "button";
    rm.className = "rm-model";
    rm.textContent = "×";
    rm.title = "Remove from lineup";
    rm.addEventListener("click", (e) => {
      e.preventDefault();
      lineup = lineup.filter(m => m !== model);
      saveLineup();
      renderLineup();
    });
    label.append(box, " " + model + " ", rm);
    modelsEl.append(label);
  }
  updateRunState();
}

function checkedModels() {
  return [...modelsEl.querySelectorAll("input:checked")].map(b => b.value);
}

function updateRunState() {
  const checked = checkedModels().length;
  runBtn.disabled =
    running || promptEl.value.trim() === "" || checked === 0;
  deleteBtn.disabled = savedSelect.value === "";
  // Courtesy note only, never a block: each model runs as its own
  // request, so no request ever exceeds the /compare batch cap.
  lineupMsg.textContent =
    checked > 5
      ? checked + " models checked; they will run as " + checked + " separate requests"
      : "";
}
promptEl.addEventListener("input", () => {
  selectedPromptId = null;
  savedSelect.value = "";
  updateRunState();
});

async function loadCatalog() {
  try {
    const resp = await fetch("/models");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    catalog = await resp.json();
  } catch (err) {
    catalog = { fetched: false, models: [] };
  }
}

function clearSearch() {
  queryInput.value = "";
  matchesEl.replaceChildren();
}

function addToLineup(id) {
  if (lineup.includes(id)) return;
  lineup.push(id);
  saveLineup();
  renderLineup();
  clearSearch();
}

function fmtPricing(m) {
  if (m.prompt_price == null || m.completion_price == null) {
    return "pricing unavailable";
  }
  // Per-million dollars: per-token floats are unreadable, and
  // per-million is how every provider quotes.
  return (
    "$" + (m.prompt_price * 1e6).toFixed(2) +
    " / $" + (m.completion_price * 1e6).toFixed(2) +
    " per 1M in/out"
  );
}

addModelBtn.addEventListener("click", () => {
  searchRow.hidden = !searchRow.hidden;
  if (searchRow.hidden) {
    clearSearch();
    return;
  }
  if (!catalog.fetched) {
    searchMsg.textContent =
      "model catalog unavailable (offline boot); add by exact id";
    queryInput.placeholder = "exact model id, Enter to add";
  } else {
    searchMsg.textContent = "";
    queryInput.placeholder = "Search models by name or id";
  }
  queryInput.focus();
});

function renderMatches() {
  matchesEl.replaceChildren();
  if (!catalog.fetched) return;
  const q = queryInput.value.trim().toLowerCase();
  if (q === "") return;
  const hits = catalog.models
    .filter(m =>
      m.id.toLowerCase().includes(q) ||
      (m.name || "").toLowerCase().includes(q)
    )
    .slice(0, 15);
  for (const m of hits) {
    const row = document.createElement("div");
    row.className = "match";
    // textContent throughout: catalog names arrive from an external
    // API and are as untrusted as model output.
    const name = document.createElement("span");
    name.className = "match-name";
    name.textContent = m.name != null ? m.name : m.id;
    const id = document.createElement("span");
    id.className = "match-id";
    id.textContent = m.id;
    const meta = document.createElement("span");
    meta.className = "match-meta";
    meta.textContent =
      fmtPricing(m) +
      (m.context_length != null
        ? ", " + m.context_length.toLocaleString() + " ctx"
        : "") +
      // The published completion cap, when there is one: it is why an
      // extended-budget run on this model may be clamped below 65536.
      (m.max_completion_tokens != null
        ? ", " + m.max_completion_tokens.toLocaleString() + " max out"
        : "");
    row.append(name, id, meta);
    if (lineup.includes(m.id)) {
      row.classList.add("dimmed");
      row.title = "already in lineup";
    } else {
      row.addEventListener("click", () => addToLineup(m.id));
    }
    matchesEl.append(row);
  }
}

queryInput.addEventListener("input", renderMatches);
queryInput.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    searchRow.hidden = true;
    clearSearch();
  } else if (e.key === "Enter" && !catalog.fetched) {
    // Offline fallback: nothing to search, Enter adds the exact id.
    e.preventDefault();
    const id = queryInput.value.trim();
    if (id) addToLineup(id);
  }
});

renderLineup();
loadCatalog();

async function loadPrompts(selectId) {
  let data;
  try {
    const resp = await fetch("/prompts");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (err) {
    promptMsg.textContent = "failed to load prompts: " + err.message;
    return;
  }
  savedSelect.replaceChildren(new Option("Saved prompts...", ""));
  for (const p of data.prompts) {
    const opt = new Option(p.name, String(p.id));
    opt.dataset.text = p.text;
    savedSelect.append(opt);
  }
  savedSelect.value = selectId != null ? String(selectId) : "";
  updateRunState();
}

savedSelect.addEventListener("change", () => {
  promptMsg.textContent = "";
  const opt = savedSelect.selectedOptions[0];
  if (savedSelect.value === "") {
    selectedPromptId = null;
  } else {
    selectedPromptId = Number(savedSelect.value);
    promptEl.value = opt.dataset.text;
  }
  updateRunState();
});

const nameRow = document.getElementById("name-row");
const nameInput = document.getElementById("prompt-name");
const confirmSave = document.getElementById("confirm-save");
const cancelSave = document.getElementById("cancel-save");

function closeNameRow() {
  nameRow.hidden = true;
  nameInput.value = "";
  saveBtn.disabled = false;
}

saveBtn.addEventListener("click", () => {
  promptMsg.textContent = "";
  if (promptEl.value.trim() === "") {
    promptMsg.textContent = "nothing to save: prompt is empty";
    return;
  }
  nameRow.hidden = false;
  saveBtn.disabled = true;
  nameInput.focus();
});

async function submitSave() {
  const name = nameInput.value.trim();
  // Empty name is a no-op, mirroring the old cancelled-dialog behavior:
  // the row stays open so the user can type or explicitly cancel.
  if (!name) return;
  try {
    const resp = await fetch("/prompts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, text: promptEl.value }),
    });
    if (resp.status === 409) {
      // Row stays open on conflict so the name can be edited and retried.
      promptMsg.textContent = "a prompt with that name already exists";
      return;
    }
    if (!resp.ok) {
      promptMsg.textContent = "save failed: HTTP " + resp.status;
      return;
    }
    const saved = await resp.json();
    closeNameRow();
    selectedPromptId = saved.id;
    await loadPrompts(saved.id);
  } catch (err) {
    promptMsg.textContent = "save failed: " + err.message;
  }
}

confirmSave.addEventListener("click", submitSave);
cancelSave.addEventListener("click", () => {
  promptMsg.textContent = "";
  closeNameRow();
});
nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    submitSave();
  } else if (e.key === "Escape") {
    promptMsg.textContent = "";
    closeNameRow();
  }
});

deleteBtn.addEventListener("click", async () => {
  const opt = savedSelect.selectedOptions[0];
  if (savedSelect.value === "") return;
  if (!window.confirm(`Delete saved prompt "${opt.textContent}"? Run history is kept.`)) return;
  let resp;
  try {
    resp = await fetch("/prompts/" + savedSelect.value, { method: "DELETE" });
  } catch (err) {
    promptMsg.textContent = "delete failed: " + err.message;
    return;
  }
  if (!resp.ok && resp.status !== 404) {
    promptMsg.textContent = "delete failed: HTTP " + resp.status;
    return;
  }
  selectedPromptId = null;
  await loadPrompts(null);
});

loadPrompts(null);

function badge(text) {
  const span = document.createElement("span");
  span.className = "badge";
  span.textContent = text;
  return span;
}

function makeColumn(model) {
  const col = document.createElement("div");
  col.className = "col";
  const header = document.createElement("div");
  header.className = "col-header";
  const name = document.createElement("span");
  name.textContent = model;
  header.append(name);
  const meta = document.createElement("div");
  meta.className = "meta";
  const body = document.createElement("div");
  body.className = "body loading";
  body.textContent = "running...";
  col.append(header, meta, body);
  resultsEl.append(col);
  return { col, header, name, meta, body };
}

// Restores a column to its initial loading state so a rerun flows
// through the exact same streaming path as a first attempt. Rebuilding
// the header from the name alone also drops the failed attempt's diff
// toggle and rerun control.
function resetColumn(ui) {
  ui.col.classList.remove("error");
  ui.header.replaceChildren(ui.name);
  ui.meta.replaceChildren();
  ui.body.className = "body loading";
  ui.body.textContent = "running...";
}

// Rerun is a human clicking, never automatic: that click is the
// honesty boundary between recovering from a transient failure and
// hiding one. The failed run is already persisted by the time this
// button exists; the rerun lands as a second run in the same group,
// so History keeps both the failure and the retry. Only live runs
// get the control, since rerunning history would be a new experiment
// wearing an old label.
function addRerun(ui, prompt, model, promptId, groupId, budget) {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "rerun-btn";
  btn.textContent = "rerun";
  btn.title = "Retry this model in place; the failed run stays in history";
  btn.addEventListener("click", () => {
    // The reset below removes the button, but disable first so a
    // double click cannot start two reruns of the same column.
    btn.disabled = true;
    resetColumn(ui);
    // Same budget as the run being retried, not the current control
    // value: a rerun is a second sample of the same experiment.
    runOne(prompt, model, promptId, groupId, budget, ui);
  });
  ui.header.append(btn);
}

function addBadges(ui, result) {
  if (result.latency_ms != null) {
    ui.meta.append(badge(Math.round(result.latency_ms) + " ms"));
  }
  if (result.ttft_ms != null) {
    ui.meta.append(badge("ttft " + Math.round(result.ttft_ms) + " ms"));
  }
  if (result.prompt_tokens != null && result.completion_tokens != null) {
    ui.meta.append(badge(result.prompt_tokens + " in / " + result.completion_tokens + " out"));
  }
  if (result.cost_usd != null) {
    ui.meta.append(badge("$" + result.cost_usd.toFixed(6)));
  }
}

// A result may carry BOTH partial text and an error (stream died
// partway); the error message renders below whatever text arrived,
// via a text-only node like everything else.
function applyError(ui, error) {
  if (error == null) return;
  ui.col.classList.add("error");
  const msg = document.createElement("div");
  msg.className = "error-msg";
  // Visually separate the error from partial text when there is some.
  if (ui.body.textContent !== "") msg.classList.add("after-text");
  msg.textContent = error;
  ui.body.append(msg);
}

function fillColumn(ui, result, sourceLabel) {
  ui.body.classList.remove("loading");
  addBadges(ui, result);
  // History replay only, never live columns: two attempts at
  // different budgets are different experiments, and the replay must
  // say which is which. Pre-budget rows carry null and show nothing.
  if (result.max_tokens != null) {
    ui.meta.append(badge("budget " + result.max_tokens));
  }
  // textContent on purpose: model output is untrusted and must never be
  // parsed as HTML. pre-wrap in CSS keeps its line breaks readable.
  ui.body.textContent = result.response_text != null ? result.response_text : "";
  applyError(ui, result.error);
  registerDiffable(ui, result, sourceLabel);
}

// ---- Diff view. Pure functions first (tokenize, lcs, render) so a JS
// ---- harness could test them later; DOM wiring below.

// Past this many word tokens the O(n*m) LCS table would freeze the
// tab, so the panel shows a notice instead.
const DIFF_TOKEN_LIMIT = 4000;

function tokenizeDiff(text) {
  // Capturing split keeps whitespace; each token is a word plus its
  // trailing whitespace so reconstruction preserves original spacing
  // and line breaks. The LCS compares the word alone (key), so a moved
  // line break does not mark the word itself as changed.
  const parts = text.split(/(\s+)/);
  const tokens = [];
  for (const part of parts) {
    if (part === "") continue;
    if (/^\s+$/.test(part) && tokens.length > 0) {
      tokens[tokens.length - 1].raw += part;
    } else if (/^\s+$/.test(part)) {
      tokens.push({ raw: part, key: "" });
    } else {
      tokens.push({ raw: part, key: part });
    }
  }
  return tokens;
}

function diffTokens(a, b) {
  // Classic LCS table with backtrack. O(n*m) is fine at bench scale
  // behind DIFF_TOKEN_LIMIT, and forty lines of understandable code
  // beat an optimal but opaque algorithm in a hand-maintained file.
  const n = a.length;
  const m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Uint16Array(m + 1));
  for (let i = 1; i <= n; i += 1) {
    for (let j = 1; j <= m; j += 1) {
      dp[i][j] = a[i - 1].key === b[j - 1].key
        ? dp[i - 1][j - 1] + 1
        : Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }
  const ops = [];
  let i = n;
  let j = m;
  while (i > 0 && j > 0) {
    if (a[i - 1].key === b[j - 1].key) {
      // Common text takes B's spacing so the merged view flows like
      // the newer response.
      ops.push({ op: "same", raw: b[j - 1].raw });
      i -= 1;
      j -= 1;
    } else if (dp[i - 1][j] >= dp[i][j - 1]) {
      ops.push({ op: "del", raw: a[i - 1].raw });
      i -= 1;
    } else {
      ops.push({ op: "ins", raw: b[j - 1].raw });
      j -= 1;
    }
  }
  while (i > 0) { ops.push({ op: "del", raw: a[i - 1].raw }); i -= 1; }
  while (j > 0) { ops.push({ op: "ins", raw: b[j - 1].raw }); j -= 1; }
  return ops.reverse();
}

function renderDiff(ops, container) {
  container.replaceChildren();
  // Adjacent tokens with the same op merge into one node: fewer DOM
  // nodes and the del/ins tint reads as one span per changed region.
  let run = null;
  function flush() {
    if (run === null) return;
    if (run.op === "same") {
      container.append(document.createTextNode(run.text));
    } else {
      // createElement plus textContent only: model output stays
      // untrusted in diff form, exactly as in the columns.
      const el = document.createElement(run.op === "del" ? "del" : "ins");
      el.textContent = run.text;
      container.append(el);
    }
    run = null;
  }
  for (const o of ops) {
    if (run !== null && run.op === o.op) {
      run.text += o.raw;
    } else {
      flush();
      run = { op: o.op, text: o.raw };
    }
  }
  flush();
}

const diffPanel = document.getElementById("diff-panel");
const diffTitle = document.getElementById("diff-title");
const diffBody = document.getElementById("diff-body");
// Armed side of a pending diff. Holds the result data, not just the
// element: history replay replaces the columns, and surviving that is
// what makes live-vs-historical diffs possible.
let armedDiff = null;

function closeDiffPanel() {
  diffPanel.hidden = true;
  diffTitle.textContent = "";
  diffBody.replaceChildren();
}

// Arming deliberately survives history replay (that is what makes
// live-vs-historical diffs possible), but not a new Run: its columns
// supersede the comparison the armed result came from, and a later
// toggle would silently diff against a vanished column.
function disarmDiff() {
  if (armedDiff !== null) {
    armedDiff.btn.classList.remove("armed");
    armedDiff = null;
  }
}

function openDiff(a, b) {
  diffTitle.textContent = a.label + " vs " + b.label;
  const ta = tokenizeDiff(a.result.response_text);
  const tb = tokenizeDiff(b.result.response_text);
  if (ta.length > DIFF_TOKEN_LIMIT || tb.length > DIFF_TOKEN_LIMIT) {
    diffBody.textContent = "responses too large to diff";
  } else {
    renderDiff(diffTokens(ta, tb), diffBody);
  }
  diffPanel.hidden = false;
}

function registerDiffable(ui, result, sourceLabel) {
  // Error-only columns have nothing to diff; partial text (the 4b
  // both-text-and-error contract) is diffable and labeled as such.
  if (result.response_text == null || sourceLabel == null) return;
  const label = sourceLabel + (result.error != null ? " (partial)" : "");
  const btn = document.createElement("button");
  btn.className = "diff-toggle";
  btn.type = "button";
  btn.textContent = "diff";
  btn.addEventListener("click", () => {
    if (armedDiff !== null && armedDiff.btn === btn) {
      btn.classList.remove("armed");
      armedDiff = null;
      return;
    }
    if (armedDiff === null) {
      armedDiff = { btn: btn, result: result, label: label };
      btn.classList.add("armed");
      return;
    }
    openDiff(armedDiff, { btn: btn, result: result, label: label });
    // The armed button may already be detached (replaced results);
    // removing the class is harmless either way.
    armedDiff.btn.classList.remove("armed");
    armedDiff = null;
  });
  ui.header.append(btn);
}

document.getElementById("diff-close").addEventListener("click", closeDiffPanel);

async function runOne(prompt, model, promptId, groupId, budget, ui) {
  // Deltas append to a dedicated text node: appendData is a pure text
  // API, so the no-HTML injection rule holds for every chunk, and the
  // node survives into the error state if the stream dies partway.
  let textNode = null;
  let finished = false;
  function appendDelta(text) {
    if (textNode === null) {
      ui.body.classList.remove("loading");
      ui.body.textContent = "";
      textNode = document.createTextNode("");
      ui.body.append(textNode);
    }
    textNode.appendData(text);
  }
  function finish(result) {
    // Idempotence guard: a connection that dies after the done event
    // was rendered must not stack a second set of badges or errors.
    if (finished) return;
    finished = true;
    ui.body.classList.remove("loading");
    if (textNode === null) ui.body.textContent = "";
    addBadges(ui, result);
    // Presentation only, never persisted: the stored error stays the
    // server's exact words. The extended budget is the one knob the
    // user can turn when reasoning burned the whole standard budget,
    // so say so right where the failure is reported.
    let shownError = result.error;
    if (
      shownError != null &&
      budget === "standard" &&
      shownError.includes("finish_reason: length")
    ) {
      shownError += "; try extended budget";
    }
    applyError(ui, shownError);
    registerDiffable(ui, result, model + " (live)");
    // Only this streaming path offers a rerun; historical replays go
    // through fillColumn and never get one.
    if (result.error != null) {
      addRerun(ui, prompt, model, promptId, groupId, budget);
    }
  }

  try {
    const resp = await fetch("/compare/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        model: model,
        prompt_id: promptId,
        group_id: groupId,
        budget: budget,
      }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const frame = buf.slice(0, sep);
        buf = buf.slice(sep + 2);
        const line = frame.split("\n").find(l => l.startsWith("data:"));
        if (!line) continue;
        const event = JSON.parse(line.slice(5));
        if (event.type === "delta") {
          appendDelta(event.text);
        } else if (event.type === "done") {
          finish(event.result);
        }
      }
    }
    if (!finished) throw new Error("stream ended unexpectedly");
  } catch (err) {
    // Network death mid-stream lands here; partial text stays visible
    // through the same error rendering as a server-reported failure.
    // The streamed text is folded into the synthetic result so the
    // column stays diffable on its partial text.
    finish({
      error: "request failed: " + err.message,
      response_text: textNode !== null ? textNode.data : null,
    });
  }
}

runBtn.addEventListener("click", async () => {
  const prompt = promptEl.value;
  const promptId = selectedPromptId;
  const budget = budgetSel.value;
  const models = checkedModels();
  resultsEl.replaceChildren();
  runLabelEl.textContent = "";
  // A new comparison replaces the columns a shown diff came from.
  closeDiffPanel();
  disarmDiff();
  running = true;
  updateRunState();
  // One request per model instead of one batch: /compare returns only when
  // its slowest model finishes, and the bench exists to watch fast models
  // land first. Columns are created up front so order tracks the checkbox
  // list, not response arrival.
  const columns = models.map(makeColumn);
  // One group per Run click so the N per-model requests land as one
  // history entry. A failed create degrades to ungrouped runs rather
  // than blocking: grouping is bookkeeping, the comparison is the
  // product.
  let groupId = null;
  try {
    const resp = await fetch("/groups", { method: "POST" });
    if (resp.ok) groupId = (await resp.json()).id;
  } catch (err) {
    // Deliberately swallowed; see above.
  }
  await Promise.allSettled(
    models.map((model, i) =>
      runOne(prompt, model, promptId, groupId, budget, columns[i])
    )
  );
  running = false;
  updateRunState();
});

// History loads on expand rather than page load: it is the rarely used
// half of the page and a stale list is worse than a slightly later one.
historyEl.addEventListener("toggle", () => {
  if (historyEl.open) loadHistory();
});

// Explicit rather than relying on the server default, so the "showing
// newest N" note below cannot drift out of sync with what was asked.
const HISTORY_LIMIT = 100;

async function loadHistory() {
  historyList.replaceChildren();
  let data;
  try {
    const resp = await fetch("/runs?limit=" + HISTORY_LIMIT);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (err) {
    historyList.textContent = "failed to load history: " + err.message;
    return;
  }
  if (data.runs.length === 0) {
    historyList.textContent = "no runs yet";
    return;
  }
  for (const run of data.runs) {
    const row = document.createElement("div");
    row.className = "hrow";
    const time = document.createElement("span");
    time.className = "htime";
    // Labeled like the replay banner: an unlabeled timestamp reads as
    // local time, and these are UTC.
    time.textContent = run.created_at.slice(0, 19).replace("T", " ") + " UTC";
    const text = document.createElement("span");
    text.className = "hprompt";
    text.textContent = run.prompt_text;
    const models = document.createElement("span");
    models.className = "hmodels";
    models.textContent = run.models.join(", ");
    row.append(time, text, models);
    row.addEventListener("click", () =>
      run.type === "group" ? showGroup(run.id) : showRun(run.id)
    );
    historyList.append(row);
  }
  // A full page means there may be older entries beyond it; say so
  // rather than letting truncation read as "this is everything".
  if (data.runs.length === HISTORY_LIMIT) {
    const note = document.createElement("div");
    note.className = "hnote";
    note.textContent =
      "showing the newest " + HISTORY_LIMIT + " entries; older ones are still in bench.db";
    historyList.append(note);
  }
}

async function showGroup(groupId) {
  let group;
  try {
    const resp = await fetch("/groups/" + groupId);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    group = await resp.json();
  } catch (err) {
    runLabelEl.textContent =
      "failed to load comparison #" + groupId + ": " + err.message;
    return;
  }
  resultsEl.replaceChildren();
  // The panel would otherwise keep showing a diff of columns that no
  // longer exist; the ARMED side stays, by design, for cross-replay
  // diffing.
  closeDiffPanel();
  runLabelEl.textContent =
    "Historical comparison #" + group.id + " from " +
    group.created_at.slice(0, 19).replace("T", " ") + " UTC";
  // Columns in checkbox (lineup) order, matching the live layout. Runs
  // persist in completion order, so run order alone would shuffle
  // columns between replays; models no longer in the lineup keep run
  // order at the end.
  const results = group.runs.flatMap(r => r.results);
  const rank = m => {
    const i = lineup.indexOf(m);
    return i === -1 ? lineup.length : i;
  };
  results.sort((a, b) => rank(a.model) - rank(b.model));
  for (const result of results) {
    fillColumn(
      makeColumn(result.model), result,
      result.model + ", comparison #" + group.id
    );
  }
  window.scrollTo({ top: 0 });
}

async function showRun(runId) {
  let run;
  try {
    const resp = await fetch("/runs/" + runId);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    run = await resp.json();
  } catch (err) {
    runLabelEl.textContent = "failed to load run #" + runId + ": " + err.message;
    return;
  }
  // Same column renderer as a live run so the textContent and
  // null-content guarantees hold for stored data too.
  resultsEl.replaceChildren();
  closeDiffPanel();
  runLabelEl.textContent =
    "Historical run #" + run.id + " from " +
    run.created_at.slice(0, 19).replace("T", " ") + " UTC";
  for (const result of run.results) {
    fillColumn(makeColumn(result.model), result, result.model + ", run #" + run.id);
  }
  window.scrollTo({ top: 0 });
}
