<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>LM Comparison Bench</title>
<script>
  // UI prefs must be on <html> before first paint or the page flashes
  // the defaults. The main script re-reads these and wires the toggles.
  (function () {
    try {
      var t = localStorage.getItem("bench-theme");
      if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
      if (localStorage.getItem("bench-motion") === "off") {
        document.documentElement.dataset.motion = "off";
      }
      if (localStorage.getItem("bench-density") === "compact") {
        document.documentElement.dataset.density = "compact";
      }
    } catch (err) { /* storage blocked: defaults apply */ }
  })();
</script>
<link rel="stylesheet" href="/static/volt.css">
</head>
<body>
<header id="cmdbar">
  <div id="brand">
    <h1>LM<span class="sl">//</span>Bench</h1>
    <span class="bar-sub">openrouter · <span id="bar-host">localhost:8000</span></span>
  </div>
  <div id="stats">
    <div class="stat" id="stat-runs"><span class="k">runs</span><span class="v">00</span></div>
    <div class="stat" id="stat-spend"><span class="k">session spend</span><span class="v" data-testid="stat-spend" title="estimated from catalog prices and reported tokens; not billed cost">~$0.0000</span></div>
    <div class="stat" id="stat-ttft"><span class="k">avg ttft</span><span class="v">—</span></div>
    <div class="stat" id="stat-lineup"><span class="k">lineup</span><span class="v">—</span></div>
  </div>
  <div id="prefs">
    <button id="theme-btn" type="button" class="pref"
            title="Color theme; auto follows the OS scheme">theme auto</button>
    <button id="motion-btn" type="button" class="pref"
            title="Ambient animation; elapsed counters keep updating either way">motion on</button>
  </div>
</header>

<div id="page">
<section id="deck" class="panel" aria-label="Run controls">
  <div id="prompt-row">
    <label class="panel-label" for="prompt">Prompt</label>
    <span id="linked-name" data-testid="linked-name"></span>
    <span id="prompt-msg" data-testid="prompt-msg" role="status"></span>
    <div id="prompt-actions">
      <span class="sel-wrap">
        <select id="saved-prompts" data-testid="saved-prompts" aria-label="Saved prompts">
          <option value="">Saved</option>
        </select>
      </span>
      <button id="save-prompt" data-testid="save-prompt" type="button">Save</button>
      <span id="name-row" hidden>
        <input id="prompt-name" data-testid="prompt-name" type="text" placeholder="Name for this prompt">
        <button id="confirm-save" data-testid="confirm-save" type="button">OK</button>
        <button id="cancel-save" type="button" class="ghost">Cancel</button>
      </span>
      <button id="delete-prompt" type="button" disabled>Delete</button>
    </div>
  </div>
  <div id="prompt-box">
    <span class="caret-glyph" aria-hidden="true">❯</span>
    <textarea id="prompt" data-testid="prompt-input" rows="1" placeholder="Prompt to send to every checked model"></textarea>
  </div>

  <div id="lineup-row">
    <span class="panel-label" id="lineup-label">Lineup 0/0</span>
    <div id="models" data-testid="lineup"></div>
    <div id="lineup-actions">
      <button id="select-all" type="button" class="ghost">All</button>
      <button id="select-none" type="button" class="ghost">None</button>
      <button id="add-model" type="button" aria-expanded="false">+ Add model</button>
    </div>
  </div>
  <div id="model-search" hidden>
    <label class="panel-label" for="model-query">Model search</label>
    <input id="model-query" type="text" placeholder="Search models by name or id">
    <div id="search-msg" role="status"></div>
    <div id="model-matches"></div>
  </div>

  <div id="run-row">
    <button id="run" data-testid="run-button" disabled>Run</button>
    <button id="stop" data-testid="stop-button" type="button" disabled>Stop</button>
    <div class="seg" id="budget-seg" role="group" aria-label="Completion token budget"
         title="Completion token budget for every model in the run">
      <button type="button" data-value="standard" data-testid="budget-standard" aria-pressed="true">standard 16k</button>
      <button type="button" data-value="extended" data-testid="budget-extended" aria-pressed="false">extended 64k</button>
    </div>
    <div class="seg" id="density-seg" role="group" aria-label="Column density"
         title="Result card density; compact fits more models side by side">
      <button type="button" data-value="comfortable" aria-pressed="true">comfortable</button>
      <button type="button" data-value="compact" aria-pressed="false">compact</button>
    </div>
    <span id="run-note" role="status"></span>
  </div>
</section>

<section id="race" class="panel" hidden aria-label="Time to first token">
  <div id="race-head">
    <span id="race-dot"></span>
    <span class="panel-label">Time to first token</span>
    <span id="race-scale"></span>
  </div>
  <div id="race-grid"></div>
</section>

<div id="run-label" data-testid="run-label" role="status"></div>
<div id="results"></div>

<div id="diff-panel" data-testid="diff-panel" class="panel" hidden>
  <div id="diff-header">
    <span id="diff-dot"></span>
    <span id="diff-label">Diff</span>
    <span id="diff-title"></span>
    <button id="diff-close" data-testid="diff-close" type="button" class="tool diff-btn">close</button>
  </div>
  <div id="diff-body" data-testid="diff-body"></div>
</div>

<details id="history">
  <summary data-testid="history-toggle">History</summary>
  <div id="history-tools">
    <input id="history-filter" type="text" aria-label="Filter history"
           placeholder="filter: prompt or model id">
    <span id="history-note"></span>
  </div>
  <div id="history-list" data-testid="history-list"></div>
</details>
</div>

<!-- Classic scripts in dependency order: the order is load-bearing.
     Each module assigns its window.Bench* namespace, and later modules
     read earlier ones, so a reorder breaks the page at load. -->
<script src="/static/lib.js"></script>
<script src="/static/state.js"></script>
<script src="/static/controls.js"></script>
<script src="/static/render.js"></script>
<script src="/static/diff.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
