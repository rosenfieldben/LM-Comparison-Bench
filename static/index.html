<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LM Comparison Bench</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #fafaf8;
    color: #222;
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  h1 { font-size: 1.3rem; margin: 0 0 1rem; }
  #prompt {
    width: 100%;
    font: inherit;
    padding: 0.6rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
  }
  #models {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.2rem;
    margin: 0.8rem 0;
  }
  #models label { cursor: pointer; font-size: 0.95rem; }
  #run {
    font: inherit;
    padding: 0.5rem 1.6rem;
    border: 1px solid #888;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  #run:disabled { opacity: 0.45; cursor: default; }
  #results {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.2rem;
    align-items: stretch;
  }
  .col {
    /* Equal-width columns regardless of content, so 2 to 5 all line up. */
    flex: 1 1 0;
    min-width: 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    padding: 0.7rem;
  }
  .col.error { background: #fdf3f2; border-color: #d9a09a; }
  .col-header {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
    word-break: break-all;
  }
  .meta { margin-bottom: 0.5rem; min-height: 1.3em; }
  .badge {
    display: inline-block;
    font-size: 0.75rem;
    background: #eee;
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    margin-right: 0.4rem;
  }
  .body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .body.loading { color: #999; font-style: italic; }
  .body .error-msg { color: #a33; }
  .body .error-msg.after-text { margin-top: 0.5rem; padding-top: 0.4rem; border-top: 1px dashed #d9a09a; }
  #prompt-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.6rem;
  }
  #prompt-bar select, #prompt-bar button, #prompt-bar input {
    font: inherit;
    font-size: 0.9rem;
    padding: 0.3rem 0.6rem;
    border: 1px solid #aaa;
    border-radius: 6px;
    background: #fff;
  }
  #name-row { display: inline-flex; gap: 0.4rem; }
  #name-row[hidden] { display: none; }
  #prompt-bar button:disabled { opacity: 0.45; }
  #prompt-msg { font-size: 0.85rem; color: #a33; }
  #run-label { margin-top: 1rem; font-size: 0.85rem; color: #888; }
  #history { margin-top: 1.5rem; }
  #history summary { cursor: pointer; color: #555; }
  .hrow {
    display: flex;
    gap: 1rem;
    padding: 0.45rem 0.3rem;
    border-bottom: 1px solid #eee;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .hrow:hover { background: #f0efec; }
  .hrow .htime { color: #888; white-space: nowrap; }
  .hrow .hprompt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hrow .hmodels { color: #777; white-space: nowrap; }
</style>
</head>
<body>
<h1>LM Comparison Bench</h1>
<div id="prompt-bar">
  <select id="saved-prompts">
    <option value="">Saved prompts...</option>
  </select>
  <button id="save-prompt" type="button">Save prompt</button>
  <span id="name-row" hidden>
    <input id="prompt-name" type="text" placeholder="Name for this prompt">
    <button id="confirm-save" type="button">OK</button>
    <button id="cancel-save" type="button">Cancel</button>
  </span>
  <button id="delete-prompt" type="button" disabled>Delete</button>
  <span id="prompt-msg"></span>
</div>
<textarea id="prompt" rows="4" placeholder="Prompt to send to every checked model"></textarea>
<div id="models"></div>
<button id="run" disabled>Run</button>
<div id="run-label"></div>
<div id="results"></div>
<details id="history">
  <summary>History</summary>
  <div id="history-list"></div>
</details>

<script>
// Hand-edited for now. A /models endpoint is a later phase; churn on this
// list is rare enough that editing a const beats an extra network call.
const MODELS = [
  "deepseek/deepseek-chat",
  "z-ai/glm-4.6",
  "mistralai/mistral-small",
  "anthropic/claude-sonnet-4.6",
];

const promptEl = document.getElementById("prompt");
const modelsEl = document.getElementById("models");
const runBtn = document.getElementById("run");
const resultsEl = document.getElementById("results");
const runLabelEl = document.getElementById("run-label");
const savedSelect = document.getElementById("saved-prompts");
const saveBtn = document.getElementById("save-prompt");
const deleteBtn = document.getElementById("delete-prompt");
const promptMsg = document.getElementById("prompt-msg");
const historyEl = document.getElementById("history");
const historyList = document.getElementById("history-list");
let running = false;
// Sent with /compare so a run links back to its saved prompt. Cleared
// the moment the textarea is edited: the text no longer matches the
// library entry, so the link would lie.
let selectedPromptId = null;

for (const model of MODELS) {
  const label = document.createElement("label");
  const box = document.createElement("input");
  box.type = "checkbox";
  box.value = model;
  box.addEventListener("change", updateRunState);
  label.append(box, " " + model);
  modelsEl.append(label);
}

function checkedModels() {
  return [...modelsEl.querySelectorAll("input:checked")].map(b => b.value);
}

function updateRunState() {
  runBtn.disabled =
    running || promptEl.value.trim() === "" || checkedModels().length === 0;
  deleteBtn.disabled = savedSelect.value === "";
}
promptEl.addEventListener("input", () => {
  selectedPromptId = null;
  savedSelect.value = "";
  updateRunState();
});

async function loadPrompts(selectId) {
  let data;
  try {
    const resp = await fetch("/prompts");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (err) {
    promptMsg.textContent = "failed to load prompts: " + err.message;
    return;
  }
  savedSelect.replaceChildren(new Option("Saved prompts...", ""));
  for (const p of data.prompts) {
    const opt = new Option(p.name, String(p.id));
    opt.dataset.text = p.text;
    savedSelect.append(opt);
  }
  savedSelect.value = selectId != null ? String(selectId) : "";
  updateRunState();
}

savedSelect.addEventListener("change", () => {
  promptMsg.textContent = "";
  const opt = savedSelect.selectedOptions[0];
  if (savedSelect.value === "") {
    selectedPromptId = null;
  } else {
    selectedPromptId = Number(savedSelect.value);
    promptEl.value = opt.dataset.text;
  }
  updateRunState();
});

const nameRow = document.getElementById("name-row");
const nameInput = document.getElementById("prompt-name");
const confirmSave = document.getElementById("confirm-save");
const cancelSave = document.getElementById("cancel-save");

function closeNameRow() {
  nameRow.hidden = true;
  nameInput.value = "";
  saveBtn.disabled = false;
}

saveBtn.addEventListener("click", () => {
  promptMsg.textContent = "";
  if (promptEl.value.trim() === "") {
    promptMsg.textContent = "nothing to save: prompt is empty";
    return;
  }
  nameRow.hidden = false;
  saveBtn.disabled = true;
  nameInput.focus();
});

async function submitSave() {
  const name = nameInput.value.trim();
  // Empty name is a no-op, mirroring the old cancelled-dialog behavior:
  // the row stays open so the user can type or explicitly cancel.
  if (!name) return;
  try {
    const resp = await fetch("/prompts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, text: promptEl.value }),
    });
    if (resp.status === 409) {
      // Row stays open on conflict so the name can be edited and retried.
      promptMsg.textContent = "a prompt with that name already exists";
      return;
    }
    if (!resp.ok) {
      promptMsg.textContent = "save failed: HTTP " + resp.status;
      return;
    }
    const saved = await resp.json();
    closeNameRow();
    selectedPromptId = saved.id;
    await loadPrompts(saved.id);
  } catch (err) {
    promptMsg.textContent = "save failed: " + err.message;
  }
}

confirmSave.addEventListener("click", submitSave);
cancelSave.addEventListener("click", () => {
  promptMsg.textContent = "";
  closeNameRow();
});
nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    submitSave();
  } else if (e.key === "Escape") {
    promptMsg.textContent = "";
    closeNameRow();
  }
});

deleteBtn.addEventListener("click", async () => {
  const opt = savedSelect.selectedOptions[0];
  if (savedSelect.value === "") return;
  if (!window.confirm(`Delete saved prompt "${opt.textContent}"? Run history is kept.`)) return;
  let resp;
  try {
    resp = await fetch("/prompts/" + savedSelect.value, { method: "DELETE" });
  } catch (err) {
    promptMsg.textContent = "delete failed: " + err.message;
    return;
  }
  if (!resp.ok && resp.status !== 404) {
    promptMsg.textContent = "delete failed: HTTP " + resp.status;
    return;
  }
  selectedPromptId = null;
  await loadPrompts(null);
});

loadPrompts(null);

function badge(text) {
  const span = document.createElement("span");
  span.className = "badge";
  span.textContent = text;
  return span;
}

function makeColumn(model) {
  const col = document.createElement("div");
  col.className = "col";
  const header = document.createElement("div");
  header.className = "col-header";
  header.textContent = model;
  const meta = document.createElement("div");
  meta.className = "meta";
  const body = document.createElement("div");
  body.className = "body loading";
  body.textContent = "running...";
  col.append(header, meta, body);
  resultsEl.append(col);
  return { col, meta, body };
}

function addBadges(ui, result) {
  if (result.latency_ms != null) {
    ui.meta.append(badge(Math.round(result.latency_ms) + " ms"));
  }
  if (result.ttft_ms != null) {
    ui.meta.append(badge("ttft " + Math.round(result.ttft_ms) + " ms"));
  }
  if (result.prompt_tokens != null && result.completion_tokens != null) {
    ui.meta.append(badge(result.prompt_tokens + " in / " + result.completion_tokens + " out"));
  }
  if (result.cost_usd != null) {
    ui.meta.append(badge("$" + result.cost_usd.toFixed(6)));
  }
}

// A result may carry BOTH partial text and an error (stream died
// partway); the error message renders below whatever text arrived,
// via a text-only node like everything else.
function applyError(ui, error) {
  if (error == null) return;
  ui.col.classList.add("error");
  const msg = document.createElement("div");
  msg.className = "error-msg";
  // Visually separate the error from partial text when there is some.
  if (ui.body.textContent !== "") msg.classList.add("after-text");
  msg.textContent = error;
  ui.body.append(msg);
}

function fillColumn(ui, result) {
  ui.body.classList.remove("loading");
  addBadges(ui, result);
  // textContent on purpose: model output is untrusted and must never be
  // parsed as HTML. pre-wrap in CSS keeps its line breaks readable.
  ui.body.textContent = result.response_text != null ? result.response_text : "";
  applyError(ui, result.error);
}

async function runOne(prompt, model, promptId, groupId, ui) {
  // Deltas append to a dedicated text node: appendData is a pure text
  // API, so the no-HTML injection rule holds for every chunk, and the
  // node survives into the error state if the stream dies partway.
  let textNode = null;
  let finished = false;
  function appendDelta(text) {
    if (textNode === null) {
      ui.body.classList.remove("loading");
      ui.body.textContent = "";
      textNode = document.createTextNode("");
      ui.body.append(textNode);
    }
    textNode.appendData(text);
  }
  function finish(result) {
    // Idempotence guard: a connection that dies after the done event
    // was rendered must not stack a second set of badges or errors.
    if (finished) return;
    finished = true;
    ui.body.classList.remove("loading");
    if (textNode === null) ui.body.textContent = "";
    addBadges(ui, result);
    applyError(ui, result.error);
  }

  try {
    const resp = await fetch("/compare/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        model: model,
        prompt_id: promptId,
        group_id: groupId,
      }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const frame = buf.slice(0, sep);
        buf = buf.slice(sep + 2);
        const line = frame.split("\n").find(l => l.startsWith("data:"));
        if (!line) continue;
        const event = JSON.parse(line.slice(5));
        if (event.type === "delta") {
          appendDelta(event.text);
        } else if (event.type === "done") {
          finish(event.result);
        }
      }
    }
    if (!finished) throw new Error("stream ended unexpectedly");
  } catch (err) {
    // Network death mid-stream lands here; partial text stays visible
    // through the same error rendering as a server-reported failure.
    finish({ error: "request failed: " + err.message });
  }
}

runBtn.addEventListener("click", async () => {
  const prompt = promptEl.value;
  const promptId = selectedPromptId;
  const models = checkedModels();
  resultsEl.replaceChildren();
  runLabelEl.textContent = "";
  running = true;
  updateRunState();
  // One request per model instead of one batch: /compare returns only when
  // its slowest model finishes, and the bench exists to watch fast models
  // land first. Columns are created up front so order tracks the checkbox
  // list, not response arrival.
  const columns = models.map(makeColumn);
  // One group per Run click so the N per-model requests land as one
  // history entry. A failed create degrades to ungrouped runs rather
  // than blocking: grouping is bookkeeping, the comparison is the
  // product.
  let groupId = null;
  try {
    const resp = await fetch("/groups", { method: "POST" });
    if (resp.ok) groupId = (await resp.json()).id;
  } catch (err) {
    // Deliberately swallowed; see above.
  }
  await Promise.allSettled(
    models.map((model, i) => runOne(prompt, model, promptId, groupId, columns[i]))
  );
  running = false;
  updateRunState();
});

// History loads on expand rather than page load: it is the rarely used
// half of the page and a stale list is worse than a slightly later one.
historyEl.addEventListener("toggle", () => {
  if (historyEl.open) loadHistory();
});

async function loadHistory() {
  historyList.replaceChildren();
  let data;
  try {
    const resp = await fetch("/runs");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (err) {
    historyList.textContent = "failed to load history: " + err.message;
    return;
  }
  if (data.runs.length === 0) {
    historyList.textContent = "no runs yet";
    return;
  }
  for (const run of data.runs) {
    const row = document.createElement("div");
    row.className = "hrow";
    const time = document.createElement("span");
    time.className = "htime";
    time.textContent = run.created_at.slice(0, 19).replace("T", " ");
    const text = document.createElement("span");
    text.className = "hprompt";
    text.textContent = run.prompt_text;
    const models = document.createElement("span");
    models.className = "hmodels";
    models.textContent = run.models.join(", ");
    row.append(time, text, models);
    row.addEventListener("click", () =>
      run.type === "group" ? showGroup(run.id) : showRun(run.id)
    );
    historyList.append(row);
  }
}

async function showGroup(groupId) {
  let group;
  try {
    const resp = await fetch("/groups/" + groupId);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    group = await resp.json();
  } catch (err) {
    runLabelEl.textContent =
      "failed to load comparison #" + groupId + ": " + err.message;
    return;
  }
  resultsEl.replaceChildren();
  runLabelEl.textContent =
    "Historical comparison #" + group.id + " from " +
    group.created_at.slice(0, 19).replace("T", " ") + " UTC";
  // Columns in checkbox (MODELS) order, matching the live layout. Runs
  // persist in completion order, so run order alone would shuffle
  // columns between replays; models gone from the const keep run order
  // at the end.
  const results = group.runs.flatMap(r => r.results);
  const rank = m => {
    const i = MODELS.indexOf(m);
    return i === -1 ? MODELS.length : i;
  };
  results.sort((a, b) => rank(a.model) - rank(b.model));
  for (const result of results) {
    fillColumn(makeColumn(result.model), result);
  }
  window.scrollTo({ top: 0 });
}

async function showRun(runId) {
  let run;
  try {
    const resp = await fetch("/runs/" + runId);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    run = await resp.json();
  } catch (err) {
    runLabelEl.textContent = "failed to load run #" + runId + ": " + err.message;
    return;
  }
  // Same column renderer as a live run so the textContent and
  // null-content guarantees hold for stored data too.
  resultsEl.replaceChildren();
  runLabelEl.textContent =
    "Historical run #" + run.id + " from " +
    run.created_at.slice(0, 19).replace("T", " ") + " UTC";
  for (const result of run.results) {
    fillColumn(makeColumn(result.model), result);
  }
  window.scrollTo({ top: 0 });
}
</script>
</body>
</html>
