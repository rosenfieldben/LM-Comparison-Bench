<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>LM Comparison Bench</title>
<script>
  // UI prefs must be on <html> before first paint or the page flashes
  // the defaults. The main script re-reads these and wires the toggles.
  (function () {
    try {
      var t = localStorage.getItem("bench-theme");
      if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
      if (localStorage.getItem("bench-motion") === "off") {
        document.documentElement.dataset.motion = "off";
      }
      if (localStorage.getItem("bench-density") === "compact") {
        document.documentElement.dataset.density = "compact";
      }
    } catch (err) { /* storage blocked: defaults apply */ }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ==== VOLT design tokens ===============================================
     Every rule below reads from these custom properties, so the next
     visual change is a token edit, not a hunt through selectors. Dark is
     the default; light applies via the OS color scheme, and an explicit
     data-theme attribute on <html> (the command-bar toggle) overrides
     the OS in either direction. Token values are the VOLT handoff's,
     verbatim. */
  :root {
    color-scheme: dark;
    --bg-page: #0b0e14; --bg-bar: #0d1117; --bg-panel: #10151d; --bg-inset: #0b0f16;
    --bg-btn: #131a24; --bg-chip: #131b26; --bg-seg-on: #1a2735; --bg-track: #161d28;
    --border: #1c2430; --border-2: #263242; --border-chip: #2a3a4c; --hairline: #151b24;
    --text: #d5dde6; --text-strong: #eef3f8; --text-body: #c6d0da; --text-sec: #a9b6c4;
    --text-dim: #5b6878; --text-faint: #525f6e; --text-ghost: #39424e; --text-dash: #313d4d;
    --accent: #38bdd8; --accent-label: #7fb9c9; --accent-val: #7fd4e8; --accent-dim: #2e93a8;
    --accent-dash-border: #2f4a58; --accent-tint: rgba(56,189,216,0.06);
    --run-fg: #06181e; --run-hover: #5accdf; --seg-fg: #c2d2df;
    --done: #3fb970; --done-label: #6fcf94;
    --err: #e5636a; --err-card-border: #33222a; --err-tint: rgba(229,99,106,0.07); --err-text: #e39197;
    --err-btn-bg: rgba(229,99,106,0.16); --err-btn-fg: #ffd9dc; --err-btn-hover: rgba(229,99,106,0.3);
    --err-btn-border: #e5636a; --err-stripe: rgba(229,99,106,0.22);
    --diff: #8ea3d8; --diff-label: #a5b7e3; --diff-btn-fg: #0b0e14; --diff-btn-hover: #a5b7e3;
    --diff-del-bg: rgba(229,99,106,0.13); --diff-del-text: #e39197;
    --diff-add-bg: rgba(63,185,112,0.13); --diff-add-text: #8ed7ab;
    --shimmer: rgba(56,189,216,0.35); --shimmer-strong: rgba(56,189,216,0.55);
    --hist-count: #55808f;

    /* density knobs; data-density="compact" on <html> retunes these
       five and nothing else */
    --pad-card: 14px; --fs-out: 12.5px; --gap-cards: 12px; --pad-cell: 7px 10px; --fs-metric: 13.5px;

    /* fonts: mono carries everything measured, the display face is for
       the brand and the Run button only */
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --display: "Space Grotesk", system-ui, sans-serif;
  }
  :root[data-density="compact"] {
    --pad-card: 10px; --fs-out: 11.5px; --gap-cards: 8px; --pad-cell: 5px 8px; --fs-metric: 12.5px;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      color-scheme: light;
      --bg-page: #f4f6f9; --bg-bar: #ffffff; --bg-panel: #ffffff; --bg-inset: #eef1f5;
      --bg-btn: #f4f6f9; --bg-chip: #fbfcfe; --bg-seg-on: #dcebef; --bg-track: #e6ebf1;
      --border: #d7dee6; --border-2: #cfd9e2; --border-chip: #cfd9e2; --hairline: #e3e9ef;
      --text: #1f2937; --text-strong: #111827; --text-body: #334155; --text-sec: #475569;
      --text-dim: #64748b; --text-faint: #94a3b8; --text-ghost: #b0bcc9; --text-dash: #cbd5e1;
      --accent: #0e94b0; --accent-label: #0b7d95; --accent-val: #0e94b0; --accent-dim: #3aabc2;
      --accent-dash-border: #9dc3cd; --accent-tint: rgba(14,148,176,0.06);
      --run-fg: #ffffff; --run-hover: #0b7d95; --seg-fg: #0b7d95;
      --done: #2f9e5f; --done-label: #2f9e5f;
      --err: #d3444c; --err-card-border: #ecd4d6; --err-tint: rgba(211,68,76,0.06); --err-text: #b23a41;
      --err-btn-bg: #d3444c; --err-btn-fg: #ffffff; --err-btn-hover: #b23a41;
      --err-btn-border: #d3444c; --err-stripe: rgba(211,68,76,0.22);
      --diff: #6b7fc4; --diff-label: #5a6eb3; --diff-btn-fg: #ffffff; --diff-btn-hover: #5a6eb3;
      --diff-del-bg: rgba(211,68,76,0.1); --diff-del-text: #b23a41;
      --diff-add-bg: rgba(47,158,95,0.12); --diff-add-text: #237347;
      --shimmer: rgba(14,148,176,0.25); --shimmer-strong: rgba(14,148,176,0.45);
      --hist-count: #0b7d95;
    }
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg-page: #f4f6f9; --bg-bar: #ffffff; --bg-panel: #ffffff; --bg-inset: #eef1f5;
    --bg-btn: #f4f6f9; --bg-chip: #fbfcfe; --bg-seg-on: #dcebef; --bg-track: #e6ebf1;
    --border: #d7dee6; --border-2: #cfd9e2; --border-chip: #cfd9e2; --hairline: #e3e9ef;
    --text: #1f2937; --text-strong: #111827; --text-body: #334155; --text-sec: #475569;
    --text-dim: #64748b; --text-faint: #94a3b8; --text-ghost: #b0bcc9; --text-dash: #cbd5e1;
    --accent: #0e94b0; --accent-label: #0b7d95; --accent-val: #0e94b0; --accent-dim: #3aabc2;
    --accent-dash-border: #9dc3cd; --accent-tint: rgba(14,148,176,0.06);
    --run-fg: #ffffff; --run-hover: #0b7d95; --seg-fg: #0b7d95;
    --done: #2f9e5f; --done-label: #2f9e5f;
    --err: #d3444c; --err-card-border: #ecd4d6; --err-tint: rgba(211,68,76,0.06); --err-text: #b23a41;
    --err-btn-bg: #d3444c; --err-btn-fg: #ffffff; --err-btn-hover: #b23a41;
    --err-btn-border: #d3444c; --err-stripe: rgba(211,68,76,0.22);
    --diff: #6b7fc4; --diff-label: #5a6eb3; --diff-btn-fg: #ffffff; --diff-btn-hover: #5a6eb3;
    --diff-del-bg: rgba(211,68,76,0.1); --diff-del-text: #b23a41;
    --diff-add-bg: rgba(47,158,95,0.12); --diff-add-text: #237347;
    --shimmer: rgba(14,148,176,0.25); --shimmer-strong: rgba(14,148,176,0.45);
    --hist-count: #0b7d95;
  }

  /* Live motion: pulse for anything waiting, shimmer for anything
     streaming, blink for the placeholder cursor. Elapsed-time counters
     are text updates and keep going with motion off. */
  @keyframes benchPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes benchShimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  @keyframes benchBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  :root[data-motion="off"] *,
  :root[data-motion="off"] *::before,
  :root[data-motion="off"] *::after { animation: none !important; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
  }

  /* ==== Base ==== */
  * { box-sizing: border-box; }
  html { background: var(--bg-page); }
  body {
    margin: 0;
    background: var(--bg-page);
    color: var(--text);
    font: 400 12.5px/1.5 var(--mono);
    /* Tabular figures everywhere so columns of costs and times align. */
    font-variant-numeric: tabular-nums;
  }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Shared control chrome. No box-shadows anywhere: depth comes from
     background layering and 1px borders only. */
  button {
    font: 500 11px var(--mono);
    color: var(--text-sec);
    background: var(--bg-btn);
    border: 1px solid var(--border-2);
    border-radius: 4px;
    min-height: 27px;
    padding: 0 12px;
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--text-strong); }
  button:disabled { color: var(--text-ghost); border-color: var(--border); cursor: default; }
  .ghost { background: none; }
  input[type="text"], select, textarea {
    font: 400 11px var(--mono);
    color: var(--text);
    background: var(--bg-inset);
    border: 1px solid var(--border-2);
    border-radius: 4px;
    min-height: 27px;
    padding: 0 10px;
    transition: border-color .15s, color .15s, background .15s;
  }
  input::placeholder, textarea::placeholder { color: var(--text-ghost); }
  .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; }
  .panel-label {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-label);
    white-space: nowrap;
  }

  /* ==== Command bar ==== */
  #cmdbar {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 14px 24px;
    background: var(--bg-bar);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  #brand { display: flex; align-items: baseline; gap: 12px; }
  #brand h1 {
    margin: 0;
    font: 700 16px var(--display);
    letter-spacing: 0.03em;
    color: var(--text-strong);
  }
  #brand h1 .sl { color: var(--accent); }
  #brand .bar-sub { font: 400 10.5px var(--mono); color: var(--text-faint); }
  #stats { display: flex; gap: 28px; margin-left: auto; }
  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat .k { font-size: 9.5px; letter-spacing: 0.08em; color: var(--text-dim); }
  .stat .v { font: 600 14px var(--mono); color: var(--text); }
  #stat-ttft .v { color: var(--accent); }
  #prefs { display: flex; gap: 6px; }
  .pref {
    background: none;
    border-color: var(--border-2);
    min-height: 24px;
    padding: 0 8px;
    font-size: 9.5px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  @media (max-width: 900px) {
    #stat-ttft, #stat-lineup { display: none; }
  }

  /* ==== Page container ==== */
  #page {
    max-width: 1500px;
    margin: 0 auto;
    padding: 20px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ==== Console deck: prompt, lineup, execute ==== */
  #prompt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 0;
    flex-wrap: wrap;
  }
  #linked-name, #prompt-msg { font-size: 10.5px; }
  #linked-name { color: var(--text-faint); }
  #prompt-msg { color: var(--err-text); }
  #prompt-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; }
  #name-row { display: inline-flex; gap: 6px; }
  #name-row[hidden] { display: none; }
  .sel-wrap { position: relative; display: inline-flex; }
  .sel-wrap::after {
    content: "▾";
    position: absolute;
    right: 9px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    font-size: 10px;
    color: var(--text-sec);
  }
  #saved-prompts {
    appearance: none;
    -webkit-appearance: none;
    font-weight: 500;
    color: var(--text-sec);
    background: var(--bg-btn);
    padding: 0 24px 0 12px;
    cursor: pointer;
    max-width: 220px;
  }
  #saved-prompts:hover { border-color: var(--accent); color: var(--text-strong); }

  #prompt-box {
    margin: 10px 16px 0;
    background: var(--bg-inset);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 14px;
    display: flex;
    gap: 10px;
  }
  #prompt-box:focus-within { border-color: var(--accent-dim); }
  #prompt-box .caret-glyph { color: var(--accent); font: 400 14px/1.6 var(--mono); }
  #prompt {
    flex: 1;
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    min-height: 1.6em;
    font: 400 14px/1.6 var(--mono);
    color: var(--text);
    caret-color: var(--accent);
    /* Auto-grown from JS; the cap keeps a pasted novel from eating the
       page, with a scrollbar past it. */
    max-height: 40vh;
    overflow-y: auto;
    resize: none;
  }
  #prompt:focus { outline: none; } /* focus is shown on the inset box */

  #lineup-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px 0;
    flex-wrap: wrap;
  }
  #lineup-label { margin-right: 4px; }
  #models { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    padding: 0 2px 0 11px;
    border: 1px solid var(--border-chip);
    border-radius: 4px;
    background: var(--bg-chip);
    font-size: 11.5px;
    color: var(--text-body);
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  .chip .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex: none;
  }
  /* Unchecked state: hollow dot, dimmed text, plain border. The state
     also lives on the (visually hidden, still focusable) checkbox. */
  .chip:not(.on) { color: var(--text-dim); border-color: var(--border); }
  .chip:not(.on) .dot { background: transparent; border: 1px solid var(--text-ghost); }
  .chip input {
    position: absolute;
    opacity: 0;
    width: 1px;
    height: 1px;
    margin: 0;
    pointer-events: none;
  }
  .chip:has(input:focus-visible) { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rm-model {
    min-width: 24px;
    min-height: 24px;
    padding: 0;
    border: none;
    background: none;
    border-radius: 4px;
    color: var(--text-faint);
    font-size: 13px;
  }
  .rm-model:hover:not(:disabled) { color: var(--err); border: none; background: none; }
  #lineup-actions { display: flex; gap: 6px; margin-left: auto; }
  #lineup-actions button { min-height: 28px; padding: 0 13px; }
  #add-model {
    color: var(--accent-label);
    background: none;
    border: 1px dashed var(--accent-dash-border);
  }
  #add-model:hover:not(:disabled) {
    background: var(--accent-tint);
    color: var(--accent-label);
    border-color: var(--accent-dash-border);
  }

  /* model picker */
  #model-search { margin: 10px 16px 0; max-width: 760px; }
  #model-search input { width: 100%; min-height: 28px; }
  #search-msg { font-size: 10.5px; color: var(--text-faint); margin-top: 4px; }
  .match {
    display: flex;
    gap: 12px;
    align-items: baseline;
    width: 100%;
    min-height: 28px;
    text-align: left;
    background: none;
    border: none;
    border-top: 1px solid var(--hairline);
    border-radius: 0;
    padding: 6px 8px;
    font-size: 11px;
    color: var(--text);
  }
  .match:hover:not(:disabled) { background: var(--bg-inset); border-color: var(--hairline); color: var(--text); }
  .match:disabled { border-color: var(--hairline); }
  .match-name { font-weight: 600; white-space: nowrap; }
  .match-id {
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .match-meta { font-size: 10px; color: var(--text-dim); margin-left: auto; white-space: nowrap; }

  #run-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 16px;
    flex-wrap: wrap;
  }
  #run {
    font: 600 13px var(--display);
    letter-spacing: 0.06em;
    color: var(--run-fg);
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 5px;
    min-height: 36px;
    padding: 0 38px;
  }
  #run:hover:not(:disabled) { background: var(--run-hover); border-color: var(--run-hover); color: var(--run-fg); }
  #run:disabled { opacity: 0.45; color: var(--run-fg); border-color: var(--accent); }
  .seg {
    display: flex;
    border: 1px solid var(--border-2);
    border-radius: 4px;
    overflow: hidden;
  }
  .seg button {
    font-weight: 400;
    font-size: 10.5px;
    min-height: 0;
    padding: 9px 13px;
    background: none;
    border: none;
    border-radius: 0;
    color: var(--text-faint);
  }
  .seg button:hover:not(:disabled) { color: var(--text-sec); background: none; border: none; }
  .seg button[aria-pressed="true"] { background: var(--bg-seg-on); color: var(--seg-fg); }
  .seg button[aria-pressed="true"]:hover { background: var(--bg-seg-on); color: var(--seg-fg); }
  #run-note { font-size: 10.5px; color: var(--text-faint); margin-left: auto; }

  /* ==== TTFT race strip ==== */
  #race { padding: 13px 16px; }
  #race-head { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
  #race-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex: none; }
  #race.live #race-dot { animation: benchPulse 2s ease-in-out infinite; }
  #race-scale { font-size: 10.5px; color: var(--text-faint); margin-left: auto; }
  #race-grid {
    display: grid;
    grid-template-columns: 20px 185px 1fr 90px;
    gap: 8px 14px;
    align-items: center;
  }
  .race-row { display: contents; }
  .race-rank { font: 600 12px var(--mono); color: var(--text-dim); }
  .race-row.working .race-rank { color: var(--accent); animation: benchPulse 2s ease-in-out infinite; }
  .race-row.error .race-rank { color: var(--err); }
  .race-name {
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .race-meter { height: 5px; background: var(--bg-track); border-radius: 3px; overflow: hidden; }
  .race-fill { width: 0; height: 100%; border-radius: 3px; background: var(--accent-dim); }
  .race-row.fastest .race-fill { background: var(--accent); }
  .race-row.working .race-fill {
    width: 100%;
    border-radius: 0;
    background: linear-gradient(90deg, transparent 30%, var(--shimmer) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: benchShimmer 2.2s linear infinite;
  }
  .race-row.error .race-fill {
    width: 100%;
    border-radius: 0;
    background: repeating-linear-gradient(-45deg, var(--err-stripe) 0 5px, transparent 5px 10px);
  }
  .race-val { font: 600 12px var(--mono); color: var(--text); text-align: right; white-space: nowrap; }
  .race-row.working .race-val { color: var(--accent); animation: benchPulse 2s ease-in-out infinite; }
  .race-row.error .race-val { color: var(--err); }

  /* ==== Result cards ==== */
  #run-label { font-size: 10.5px; color: var(--text-faint); }
  #run-label:empty { display: none; }
  #results {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: var(--gap-cards);
    align-items: start;
  }
  #results:empty { display: none; }
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    /* State rides the 2px top edge AND the header label; see setState. */
    border-top: 2px solid var(--border);
    border-radius: 6px;
  }
  .card[data-state="working"] { border-top-color: var(--accent); }
  .card[data-state="done"] { border-top-color: var(--done); }
  .card[data-state="error"] { border-color: var(--err-card-border); border-top-color: var(--err); }
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px var(--pad-card) 0;
  }
  .model-id {
    font: 600 12px var(--mono);
    color: var(--text-strong);
    word-break: break-all;
    margin-right: auto;
  }
  .state-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex: none; }
  .card[data-state="working"] .state-dot { background: var(--accent); animation: benchPulse 2s ease-in-out infinite; }
  .card[data-state="done"] .state-dot { background: var(--done); }
  .card[data-state="error"] .state-dot { background: var(--err); }
  .status {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .card[data-state="working"] .status { color: var(--accent-label); }
  .card[data-state="done"] .status { color: var(--done-label); }
  .card[data-state="error"] .status { color: var(--err); }
  .card-shimmer { display: none; height: 2px; margin-top: 10px; }
  .card[data-state="working"] .card-shimmer {
    display: block;
    background: linear-gradient(90deg, transparent 30%, var(--shimmer-strong) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: benchShimmer 2.2s linear infinite;
  }
  /* Metric cells separated by 1px hairline gaps: the grid background is
     the hairline color, the cells are panel-colored. */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--hairline);
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
    margin-top: 10px;
  }
  .card[data-state="working"] .metrics { margin-top: 0; border-top: none; }
  .mcell { background: var(--bg-panel); padding: var(--pad-cell); min-width: 0; }
  .mk { font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .mv { font: 600 var(--fs-metric) var(--mono); color: var(--text); overflow: hidden; text-overflow: ellipsis; }
  .mv .unit { font-size: 9px; color: var(--text-dim); }
  .mcell.ttft .mv { color: var(--accent-val); }
  .card[data-state="error"] .mcell.ttft .mv { color: var(--text); }
  .mv.empty { color: var(--text-dash); }
  .card[data-state="error"] .mv.empty { color: var(--text-dash); }
  .body {
    padding: 12px var(--pad-card);
    font: 400 var(--fs-out)/1.65 var(--mono);
    color: var(--text-body);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .body.loading { color: var(--text-faint); font-style: italic; }
  .body.loading::after {
    content: "";
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 4px;
    animation: benchBlink 1.2s steps(1) infinite;
  }
  /* Six line preview; the fold control in the action row is the way back. */
  .body.folded { max-height: calc(1.65em * 6 + 24px); overflow: hidden; }
  .error-msg {
    padding: 8px 10px;
    background: var(--err-tint);
    border-left: 2px solid var(--err);
    border-radius: 0 4px 4px 0;
    font: 400 11px/1.5 var(--mono);
    font-style: normal;
    color: var(--err-text);
  }
  .error-msg.after-text { margin-top: 10px; }
  .card-tools {
    display: flex;
    gap: 6px;
    padding: 0 var(--pad-card) 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .card-tools:empty { display: none; }
  .tool {
    font-size: 10.5px;
    min-height: 25px;
    padding: 0 11px;
    background: none;
    color: var(--text-sec);
  }
  .tool.diff-btn:hover:not(:disabled) { border-color: var(--diff); color: var(--diff-label); }
  .tool.armed { background: var(--diff); border-color: var(--diff); color: var(--diff-btn-fg); }
  .tool.armed:hover:not(:disabled) {
    background: var(--diff-btn-hover);
    border-color: var(--diff-btn-hover);
    color: var(--diff-btn-fg);
  }
  .rerun-btn {
    background: var(--err-btn-bg);
    border: 1px solid var(--err-btn-border);
    color: var(--err-btn-fg);
    padding: 0 12px;
  }
  .rerun-btn:hover:not(:disabled) {
    background: var(--err-btn-hover);
    border-color: var(--err-btn-border);
    color: var(--err-btn-fg);
  }
  .budget-note { font-size: 10.5px; color: var(--text-faint); margin-left: auto; }

  /* ==== Diff panel ==== */
  #diff-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--hairline);
  }
  #diff-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--diff); flex: none; }
  #diff-label {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--diff-label);
  }
  #diff-title { font: 500 11.5px var(--mono); color: var(--text); word-break: break-word; }
  #diff-close { margin-left: auto; flex: none; }
  #diff-body {
    padding: 14px 16px;
    font: 400 var(--fs-out)/1.7 var(--mono);
    color: var(--text-body);
    white-space: pre-wrap;
    word-break: break-word;
  }
  #diff-body del {
    background: var(--diff-del-bg);
    color: var(--diff-del-text);
    text-decoration: line-through;
    padding: 1px 2px;
    border-radius: 2px;
  }
  #diff-body ins {
    background: var(--diff-add-bg);
    color: var(--diff-add-text);
    text-decoration: none;
    padding: 1px 2px;
    border-radius: 2px;
  }

  /* ==== History strip: flat, no panel chrome ==== */
  #history summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 28px;
    padding: 4px 2px;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  #history summary::-webkit-details-marker { display: none; }
  #history summary::before { content: "▸"; color: var(--text-ghost); }
  #history[open] summary::before { content: "▾"; }
  #history-tools { display: flex; align-items: center; gap: 10px; padding: 0 2px 8px; }
  #history-filter {
    flex: 1;
    max-width: 420px;
    min-height: 24px;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 4px 0;
    font-size: 10.5px;
    color: var(--text);
  }
  #history-note { font-size: 10.5px; color: var(--text-ghost); margin-left: auto; white-space: nowrap; }
  #history-list { font-size: 11px; color: var(--text-faint); }
  .hrow {
    display: grid;
    grid-template-columns: max-content 1fr max-content;
    gap: 16px;
    align-items: center;
    width: 100%;
    min-height: 0;
    text-align: left;
    background: none;
    border: none;
    border-top: 1px solid var(--hairline);
    border-radius: 0;
    padding: 7px 10px;
    font: 400 11px var(--mono);
    color: var(--text);
    cursor: pointer;
  }
  .hrow:hover:not(:disabled) { background: var(--bg-panel); border-color: var(--hairline); color: var(--text); }
  .hrow:last-of-type { border-bottom: 1px solid var(--hairline); }
  .htime { color: var(--text-faint); white-space: nowrap; }
  .hprompt { color: var(--text-body); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hcount { color: var(--hist-count); white-space: nowrap; }
</style>
</head>
<body>
<header id="cmdbar">
  <div id="brand">
    <h1>LM<span class="sl">//</span>Bench</h1>
    <span class="bar-sub">openrouter · <span id="bar-host">localhost:8000</span></span>
  </div>
  <div id="stats">
    <div class="stat" id="stat-runs"><span class="k">runs</span><span class="v">00</span></div>
    <div class="stat" id="stat-spend"><span class="k">session spend</span><span class="v">$0.0000</span></div>
    <div class="stat" id="stat-ttft"><span class="k">avg ttft</span><span class="v">—</span></div>
    <div class="stat" id="stat-lineup"><span class="k">lineup</span><span class="v">—</span></div>
  </div>
  <div id="prefs">
    <button id="theme-btn" type="button" class="pref"
            title="Color theme; auto follows the OS scheme">theme auto</button>
    <button id="motion-btn" type="button" class="pref"
            title="Ambient animation; elapsed counters keep updating either way">motion on</button>
  </div>
</header>

<div id="page">
<section id="deck" class="panel" aria-label="Run controls">
  <div id="prompt-row">
    <span class="panel-label">Prompt</span>
    <span id="linked-name"></span>
    <span id="prompt-msg" role="status"></span>
    <div id="prompt-actions">
      <span class="sel-wrap">
        <select id="saved-prompts" aria-label="Saved prompts">
          <option value="">Saved</option>
        </select>
      </span>
      <button id="save-prompt" type="button">Save</button>
      <span id="name-row" hidden>
        <input id="prompt-name" type="text" placeholder="Name for this prompt">
        <button id="confirm-save" type="button">OK</button>
        <button id="cancel-save" type="button" class="ghost">Cancel</button>
      </span>
      <button id="delete-prompt" type="button" disabled>Delete</button>
    </div>
  </div>
  <div id="prompt-box">
    <span class="caret-glyph" aria-hidden="true">❯</span>
    <textarea id="prompt" rows="1" placeholder="Prompt to send to every checked model"></textarea>
  </div>

  <div id="lineup-row">
    <span class="panel-label" id="lineup-label">Lineup 0/0</span>
    <div id="models"></div>
    <div id="lineup-actions">
      <button id="select-all" type="button" class="ghost">All</button>
      <button id="select-none" type="button" class="ghost">None</button>
      <button id="add-model" type="button" aria-expanded="false">+ Add model</button>
    </div>
  </div>
  <div id="model-search" hidden>
    <input id="model-query" type="text" placeholder="Search models by name or id">
    <div id="search-msg" role="status"></div>
    <div id="model-matches"></div>
  </div>

  <div id="run-row">
    <button id="run" disabled>Run</button>
    <div class="seg" id="budget-seg" role="group" aria-label="Completion token budget"
         title="Completion token budget for every model in the run">
      <button type="button" data-value="standard" aria-pressed="true">standard 16k</button>
      <button type="button" data-value="extended" aria-pressed="false">extended 64k</button>
    </div>
    <div class="seg" id="density-seg" role="group" aria-label="Column density"
         title="Result card density; compact fits more models side by side">
      <button type="button" data-value="comfortable" aria-pressed="true">comfortable</button>
      <button type="button" data-value="compact" aria-pressed="false">compact</button>
    </div>
    <span id="run-note" role="status"></span>
  </div>
</section>

<section id="race" class="panel" hidden aria-label="Time to first token">
  <div id="race-head">
    <span id="race-dot"></span>
    <span class="panel-label">Time to first token</span>
    <span id="race-scale"></span>
  </div>
  <div id="race-grid"></div>
</section>

<div id="run-label" role="status"></div>
<div id="results"></div>

<div id="diff-panel" class="panel" hidden>
  <div id="diff-header">
    <span id="diff-dot"></span>
    <span id="diff-label">Diff</span>
    <span id="diff-title"></span>
    <button id="diff-close" type="button" class="tool diff-btn">close</button>
  </div>
  <div id="diff-body"></div>
</div>

<details id="history">
  <summary>History</summary>
  <div id="history-tools">
    <input id="history-filter" type="text" aria-label="Filter history"
           placeholder="filter: prompt or model id">
    <span id="history-note"></span>
  </div>
  <div id="history-list"></div>
</details>
</div>

<script>
// Seed for a fresh browser only. The live lineup is a localStorage
// preference of THIS browser, not bench data: keeping it out of sqlite
// means bench.db stays purely runs and prompts, and losing it costs
// four clicks. The key predates the interface overhaul and must never
// change: users have lineups stored under it.
const DEFAULT_LINEUP = [
  "deepseek/deepseek-chat",
  "z-ai/glm-4.6",
  "mistralai/mistral-small",
  "anthropic/claude-sonnet-4.6",
];
const LINEUP_KEY = "bench-lineup";

function loadLineup() {
  try {
    const parsed = JSON.parse(localStorage.getItem(LINEUP_KEY));
    if (Array.isArray(parsed) && parsed.every(x => typeof x === "string")) {
      return parsed;
    }
  } catch (err) {
    // Unparseable storage falls through to the defaults.
  }
  return [...DEFAULT_LINEUP];
}

let lineup = loadLineup();

function saveLineup() {
  localStorage.setItem(LINEUP_KEY, JSON.stringify(lineup));
}

// UI prefs (theme, motion, density) persist per browser; a bootstrap
// script in <head> applies them before first paint.
function prefGet(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v !== null ? v : fallback;
  } catch (err) {
    return fallback;
  }
}
function prefSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (err) {
    // Blocked storage just means the pref lasts one session.
  }
}

const promptEl = document.getElementById("prompt");
const modelsEl = document.getElementById("models");
const runBtn = document.getElementById("run");
const resultsEl = document.getElementById("results");
const runLabelEl = document.getElementById("run-label");
const savedSelect = document.getElementById("saved-prompts");
const saveBtn = document.getElementById("save-prompt");
const deleteBtn = document.getElementById("delete-prompt");
const promptMsg = document.getElementById("prompt-msg");
const linkedEl = document.getElementById("linked-name");
const lineupLabel = document.getElementById("lineup-label");
const runNote = document.getElementById("run-note");
const historyEl = document.getElementById("history");
const historyList = document.getElementById("history-list");
const historyFilter = document.getElementById("history-filter");
const historyNote = document.getElementById("history-note");
const raceEl = document.getElementById("race");
const raceGrid = document.getElementById("race-grid");
const raceScale = document.getElementById("race-scale");
const statRuns = document.querySelector("#stat-runs .v");
const statSpend = document.querySelector("#stat-spend .v");
const statTtft = document.querySelector("#stat-ttft .v");
const statLineup = document.querySelector("#stat-lineup .v");
let running = false;
// Sent with the run so it links back to its saved prompt. Cleared
// the moment the textarea is edited: the text no longer matches the
// library entry, so the link would lie.
let selectedPromptId = null;

const addModelBtn = document.getElementById("add-model");
const searchRow = document.getElementById("model-search");
const queryInput = document.getElementById("model-query");
const searchMsg = document.getElementById("search-msg");
const matchesEl = document.getElementById("model-matches");
// Snapshot of GET /models; fetched=false switches the picker to the
// exact-id fallback so the bench stays usable on an offline boot.
let catalog = { fetched: false, models: [] };

document.getElementById("bar-host").textContent = location.host || "localhost:8000";

// ---- Command-bar session stats. Runs, spend and mean TTFT are this
// ---- browser session's live totals, reset by a reload on purpose:
// ---- the bar answers "what has this sitting cost me", not history.
const sessionStats = { runs: 0, spend: 0, ttftSum: 0, ttftN: 0 };

function renderStats() {
  statRuns.textContent = String(sessionStats.runs).padStart(2, "0");
  statSpend.textContent = "$" + sessionStats.spend.toFixed(4);
  statTtft.textContent = sessionStats.ttftN > 0
    ? Math.round(sessionStats.ttftSum / sessionStats.ttftN) + " ms"
    : "—";
  statLineup.textContent = lineup.length + (lineup.length === 1 ? " model" : " models");
}

// ---- UI prefs: theme override (auto follows the OS), motion, density.
const themeBtn = document.getElementById("theme-btn");
const motionBtn = document.getElementById("motion-btn");
const THEMES = ["auto", "dark", "light"];
let themeMode = prefGet("bench-theme", "auto");
if (!THEMES.includes(themeMode)) themeMode = "auto";

function applyTheme() {
  if (themeMode === "auto") {
    delete document.documentElement.dataset.theme;
  } else {
    document.documentElement.dataset.theme = themeMode;
  }
  themeBtn.textContent = "theme " + themeMode;
}
themeBtn.addEventListener("click", () => {
  themeMode = THEMES[(THEMES.indexOf(themeMode) + 1) % THEMES.length];
  prefSet("bench-theme", themeMode);
  applyTheme();
});
applyTheme();

// Motion off kills every animation via CSS; elapsed-time counters are
// plain text updates and keep going. prefers-reduced-motion does the
// same regardless of this toggle.
let motionOn = prefGet("bench-motion", "on") !== "off";

function applyMotion() {
  document.documentElement.dataset.motion = motionOn ? "on" : "off";
  motionBtn.textContent = "motion " + (motionOn ? "on" : "off");
}
motionBtn.addEventListener("click", () => {
  motionOn = !motionOn;
  prefSet("bench-motion", motionOn ? "on" : "off");
  applyMotion();
});
applyMotion();

// Segmented controls: a button pair where aria-pressed is the state.
function initSeg(el, initial, onChange) {
  const btns = [...el.querySelectorAll("button")];
  function set(value) {
    for (const b of btns) {
      b.setAttribute("aria-pressed", String(b.dataset.value === value));
    }
  }
  for (const b of btns) {
    b.addEventListener("click", () => {
      set(b.dataset.value);
      onChange(b.dataset.value);
    });
  }
  set(initial);
}

// Deliberately per-session, never persisted: extended costs real
// money, so the safe default must reassert itself on the next visit.
let budgetValue = "standard";
initSeg(document.getElementById("budget-seg"), budgetValue, (v) => {
  budgetValue = v;
  updateRunState();
});

// Density persists, unlike the budget: layout taste is harmless.
let densityValue = prefGet("bench-density", "comfortable");
if (densityValue !== "compact") densityValue = "comfortable";
document.documentElement.dataset.density = densityValue;
initSeg(document.getElementById("density-seg"), densityValue, (v) => {
  densityValue = v;
  document.documentElement.dataset.density = v;
  prefSet("bench-density", v);
});

// Chips and the race strip show ids without the vendor prefix; the
// full id stays in the title attribute and in every request.
function shortName(id) {
  const slash = id.indexOf("/");
  return slash === -1 ? id : id.slice(slash + 1);
}

function autosizePrompt() {
  // Height tracks content; the CSS max-height caps runaway growth.
  promptEl.style.height = "auto";
  promptEl.style.height = promptEl.scrollHeight + "px";
}

function renderLineup() {
  // Checked state is per-session; carry it across rebuilds so removing
  // one model does not uncheck the others.
  const checked = new Set(checkedModels());
  modelsEl.replaceChildren();
  for (const model of lineup) {
    const chip = document.createElement("label");
    chip.className = "chip";
    chip.title = model;
    const box = document.createElement("input");
    box.type = "checkbox";
    box.value = model;
    box.checked = checked.has(model);
    if (box.checked) chip.classList.add("on");
    box.addEventListener("change", () => {
      chip.classList.toggle("on", box.checked);
      updateRunState();
    });
    // The dot is the checked indicator: filled accent = on, hollow = off.
    const dot = document.createElement("span");
    dot.className = "dot";
    const id = document.createElement("span");
    id.textContent = shortName(model);
    const rm = document.createElement("button");
    rm.type = "button";
    rm.className = "rm-model";
    rm.textContent = "×";
    rm.title = "Remove from lineup";
    rm.setAttribute("aria-label", "Remove " + model + " from lineup");
    rm.addEventListener("click", (e) => {
      // preventDefault stops the click from also toggling the checkbox
      // through the wrapping label.
      e.preventDefault();
      lineup = lineup.filter(m => m !== model);
      saveLineup();
      renderLineup();
      renderStats();
    });
    chip.append(box, dot, id, rm);
    modelsEl.append(chip);
  }
  updateRunState();
  renderStats();
}

function checkedModels() {
  return [...modelsEl.querySelectorAll("input:checked")].map(b => b.value);
}

function setAllChecked(on) {
  for (const box of modelsEl.querySelectorAll("input[type=checkbox]")) {
    box.checked = on;
    box.closest(".chip").classList.toggle("on", on);
  }
  updateRunState();
}
document.getElementById("select-all").addEventListener("click", () => setAllChecked(true));
document.getElementById("select-none").addEventListener("click", () => setAllChecked(false));

// What /compare/stream sends as the completion budget; the server
// clamps per model to the published completion cap.
const BUDGET_TOKENS = { standard: 16384, extended: 65536 };

function fmtEstimate(v) {
  if (v >= 100) return String(Math.round(v));
  return Number(v.toPrecision(2)).toString();
}

// "n requests · est. max $x/run". The estimate is checked models ×
// completion price × budget (per-model capped), the worst billable
// case; it is omitted when pricing is unavailable. The request count
// doubles as the note that each model runs as its own request.
function updateEstimate() {
  const models = checkedModels();
  if (models.length === 0) {
    runNote.textContent = "";
    return;
  }
  let text = models.length + (models.length === 1 ? " request" : " requests");
  if (catalog.fetched) {
    let est = 0;
    let computable = true;
    for (const id of models) {
      const m = catalog.models.find(x => x.id === id);
      if (!m || m.completion_price == null) {
        computable = false;
        break;
      }
      const cap = m.max_completion_tokens != null
        ? Math.min(m.max_completion_tokens, BUDGET_TOKENS[budgetValue])
        : BUDGET_TOKENS[budgetValue];
      est += m.completion_price * cap;
    }
    if (computable) text += " · est. max $" + fmtEstimate(est) + "/run";
  }
  runNote.textContent = text;
}

function renderLinked() {
  const opt = savedSelect.selectedOptions[0];
  linkedEl.textContent = savedSelect.value !== "" && opt
    ? "linked: " + opt.textContent
    : "";
}

function updateRunState() {
  const checked = checkedModels().length;
  runBtn.disabled =
    running || promptEl.value.trim() === "" || checked === 0;
  deleteBtn.disabled = savedSelect.value === "";
  lineupLabel.textContent = "Lineup " + checked + "/" + lineup.length;
  renderLinked();
  updateEstimate();
}
promptEl.addEventListener("input", () => {
  selectedPromptId = null;
  savedSelect.value = "";
  autosizePrompt();
  updateRunState();
});

async function loadCatalog() {
  try {
    const resp = await fetch("/models");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    catalog = await resp.json();
  } catch (err) {
    catalog = { fetched: false, models: [] };
  }
  // Pricing just arrived (or didn't): refresh the run estimate.
  updateRunState();
}

function clearSearch() {
  queryInput.value = "";
  matchesEl.replaceChildren();
}

function addToLineup(id) {
  if (lineup.includes(id)) return;
  lineup.push(id);
  saveLineup();
  renderLineup();
  clearSearch();
}

function fmtPricing(m) {
  if (m.prompt_price == null || m.completion_price == null) {
    return "pricing unavailable";
  }
  // Per-million dollars: per-token floats are unreadable, and
  // per-million is how every provider quotes.
  return (
    "$" + (m.prompt_price * 1e6).toFixed(2) +
    " / $" + (m.completion_price * 1e6).toFixed(2) +
    " per 1M in/out"
  );
}

addModelBtn.addEventListener("click", () => {
  searchRow.hidden = !searchRow.hidden;
  addModelBtn.setAttribute("aria-expanded", String(!searchRow.hidden));
  if (searchRow.hidden) {
    clearSearch();
    return;
  }
  if (!catalog.fetched) {
    searchMsg.textContent =
      "model catalog unavailable (offline boot); add by exact id";
    queryInput.placeholder = "exact model id, Enter to add";
  } else {
    searchMsg.textContent = "";
    queryInput.placeholder = "Search models by name or id";
  }
  queryInput.focus();
});

function renderMatches() {
  matchesEl.replaceChildren();
  if (!catalog.fetched) return;
  const q = queryInput.value.trim().toLowerCase();
  if (q === "") return;
  const hits = catalog.models
    .filter(m =>
      m.id.toLowerCase().includes(q) ||
      (m.name || "").toLowerCase().includes(q)
    )
    .slice(0, 15);
  for (const m of hits) {
    // Buttons, not divs: rows must be reachable by keyboard.
    const row = document.createElement("button");
    row.type = "button";
    row.className = "match";
    // textContent throughout: catalog names arrive from an external
    // API and are as untrusted as model output.
    const name = document.createElement("span");
    name.className = "match-name";
    name.textContent = m.name != null ? m.name : m.id;
    const id = document.createElement("span");
    id.className = "match-id";
    id.textContent = m.id;
    const meta = document.createElement("span");
    meta.className = "match-meta";
    meta.textContent =
      fmtPricing(m) +
      (m.context_length != null
        ? ", " + m.context_length.toLocaleString() + " ctx"
        : "") +
      // The published completion cap, when there is one: it is why an
      // extended-budget run on this model may be clamped below 65536.
      (m.max_completion_tokens != null
        ? ", " + m.max_completion_tokens.toLocaleString() + " max out"
        : "");
    row.append(name, id, meta);
    if (lineup.includes(m.id)) {
      row.disabled = true;
      row.title = "already in lineup";
    } else {
      row.addEventListener("click", () => addToLineup(m.id));
    }
    matchesEl.append(row);
  }
}

queryInput.addEventListener("input", renderMatches);
queryInput.addEventListener("keydown", (e) => {

async function loadPrompts(selectId) {
  let data;
  try {
    const resp = await fetch("/prompts");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (err) {
    promptMsg.textContent = "failed to load prompts: " + err.message;
    return;
  }
  savedSelect.replaceChildren(new Option("Saved", ""));
  for (const p of data.prompts) {
    const opt = new Option(p.name, String(p.id));
    opt.dataset.text = p.text;
    savedSelect.append(opt);
  }
  savedSelect.value = selectId != null ? String(selectId) : "";
  updateRunState();
}

savedSelect.addEventListener("change", () => {
  promptMsg.textContent = "";
  const opt = savedSelect.selectedOptions[0];
  if (savedSelect.value === "") {
    selectedPromptId = null;
  } else {
    selectedPromptId = Number(savedSelect.value);
    promptEl.value = opt.dataset.text;
    autosizePrompt();
  }
  updateRunState();
});

const nameRow = document.getElementById("name-row");
const nameInput = document.getElementById("prompt-name");
const confirmSave = document.getElementById("confirm-save");
const cancelSave = document.getElementById("cancel-save");

function closeNameRow() {
  nameRow.hidden = true;
  nameInput.value = "";
  saveBtn.disabled = false;
}

saveBtn.addEventListener("click", () => {
  promptMsg.textContent = "";
  if (promptEl.value.trim() === "") {
    promptMsg.textContent = "nothing to save: prompt is empty";
    return;
  }
  nameRow.hidden = false;
  saveBtn.disabled = true;
  nameInput.focus();
});

async function submitSave() {
  const name = nameInput.value.trim();
  // Empty name is a no-op, mirroring the old cancelled-dialog behavior:
  // the row stays open so the user can type or explicitly cancel.
  if (!name) return;
  try {
    const resp = await fetch("/prompts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, text: promptEl.value }),
    });
    if (resp.status === 409) {
      // Row stays open on conflict so the name can be edited and retried.
      promptMsg.textContent = "a prompt with that name already exists";
      return;
    }
    if (!resp.ok) {
      promptMsg.textContent = "save failed: HTTP " + resp.status;
      return;
    }
    const saved = await resp.json();
    closeNameRow();
    selectedPromptId = saved.id;
    await loadPrompts(saved.id);
  } catch (err) {
    promptMsg.textContent = "save failed: " + err.message;
  }
}

confirmSave.addEventListener("click", submitSave);
cancelSave.addEventListener("click", () => {
  promptMsg.textContent = "";
  closeNameRow();
});
nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    submitSave();
  } else if (e.key === "Escape") {
    promptMsg.textContent = "";
    closeNameRow();
  }
});

deleteBtn.addEventListener("click", async () => {

  if (savedSelect.value === "") return;
  if (!window.confirm(`Delete saved prompt "${opt.textContent}"? Run history is kept.`)) return;
  let resp;
  try {
    resp = await fetch("/prompts/" + savedSelect.value, { method: "DELETE" });
  } catch (err) {
    promptMsg.textContent = "delete failed: " + err.message;
    return;
  }
  if (!resp.ok && resp.status !== 404) {

});

// ---- TTFT race strip. One row per model in the live run; the meter
// ---- shimmers until the first token, then locks to a bar sized by
// ---- TTFT on a shared scale. Rank is first-token finishing order.
// ---- Historical replays hide the strip: it visualizes the race in
// ---- progress, and history has no race.
let race = null;

function niceScale(maxTtft) {
  // Smallest 100·2^k at or above the slowest known TTFT, so bars keep
  // honest proportions and the scale label stays a round number.
  let scale = 100;
  while (scale < maxTtft) scale *= 2;
  return scale;
}

function raceInit(models) {
  race = { rows: new Map() };
  raceGrid.replaceChildren();
  for (const model of models) {
    const wrap = document.createElement("div");
    wrap.className = "race-row working";
    const rank = document.createElement("span");
    rank.className = "race-rank";
    const name = document.createElement("span");
    name.className = "race-name";
    name.textContent = shortName(model);
    name.title = model;
    const meter = document.createElement("div");
    meter.className = "race-meter";
    const fill = document.createElement("div");
    fill.className = "race-fill";
    meter.append(fill);
    const val = document.createElement("span");
    val.className = "race-val";
    wrap.append(rank, name, meter, val);
    raceGrid.append(wrap);
    race.rows.set(model, { wrap, rank, fill, val, ttft: null, status: "working" });
  }
  raceEl.hidden = false;
  raceRender();
}

// Reruns flow back through here: the errored row returns to the
// shimmer state and races again.
function raceRestart(model) {
  const row = race !== null ? race.rows.get(model) : undefined;
  if (!row) return;
  row.status = "working";
  row.ttft = null;
  raceRender();
}

function raceTtft(model, ms) {
  const row = race !== null ? race.rows.get(model) : undefined;
  if (!row) return;
  row.ttft = ms;
  row.status = "ttft";
  raceRender();
}

function raceError(model) {
  const row = race !== null ? race.rows.get(model) : undefined;
  if (!row) return;
  row.status = "error";
  raceRender();
}

// The server's TTFT replaces the client-side first-token measurement
// when the run completes; they differ by network jitter only.
function raceDone(model, serverTtft) {
  const row = race !== null ? race.rows.get(model) : undefined;
  if (!row) return;
  if (serverTtft != null) row.ttft = serverTtft;
  row.status = "ttft";
  raceRender();
}

function raceRender() {
  if (race === null) return;
  const rows = [...race.rows.values()];
  const ranked = rows
    .filter(r => r.status === "ttft" && r.ttft != null)
    .sort((a, b) => a.ttft - b.ttft);
  const scale = niceScale(ranked.length > 0 ? ranked[ranked.length - 1].ttft : 0);
  raceScale.textContent = "scale 0–" + scale + " ms";
  raceEl.classList.toggle("live", rows.some(r => r.status === "working"));
  for (const r of rows) r.rankN = null;
  ranked.forEach((r, i) => { r.rankN = i + 1; });
  for (const r of rows) {
    r.wrap.className =
      "race-row " + r.status + (r.rankN === 1 ? " fastest" : "");
    if (r.status === "working") {
      r.rank.textContent = "·";
      r.fill.style.width = "";
      if (r.val.textContent === "" || r.val.textContent === "failed") {
        r.val.textContent = "0 s";
      }
    } else if (r.status === "error") {
      r.rank.textContent = "—";
      r.fill.style.width = "";
      r.val.textContent = "failed";
    } else if (r.ttft != null) {
      r.rank.textContent = String(r.rankN);
      r.fill.style.width = Math.min(100, (r.ttft / scale) * 100) + "%";
      r.val.textContent = Math.round(r.ttft) + " ms";
    } else {
      // Done without a TTFT (server reported none): no bar, no rank.
      r.rank.textContent = "·";
      r.fill.style.width = "0%";
      r.val.textContent = "—";
    }
  }
}

function hideRace() {
  raceEl.hidden = true;
  race = null;
}

// ---- Result cards. One skeleton builder, one completion renderer;
// ---- live streams and history replay both end in completeColumn so
// ---- the textContent-only rule and the error contract hold once.

// State is conveyed twice on purpose, a colored top edge plus a text
// label, so status never rides on color alone. Only the state word is
// a polite live region; the elapsed counter next to it updates every
// second and must not be announced each time.
function setState(ui, state) {
  ui.card.dataset.state = state;
  ui.statusWord.textContent = state === "working" ? "thinking" : state;
  ui.statusTime.textContent = "";
}

function metricCell(key, label) {
  const cell = document.createElement("div");
  cell.className = "mcell " + key;
  const k = document.createElement("div");
  k.className = "mk";
  k.textContent = label;
  const v = document.createElement("div");
  v.className = "mv empty";
  v.textContent = "—";
  cell.append(k, v);
  return { cell, v };
}

function clearMetric(el) {
  el.classList.add("empty");
  el.textContent = "—";
}

function setMetric(el, text, unit) {
  el.classList.remove("empty");
  el.textContent = text;
  if (unit != null) {
    const u = document.createElement("span");
    u.className = "unit";
    u.textContent = " " + unit;
    el.append(u);
  }
}

function makeColumn(model) {
  const card = document.createElement("div");
  card.className = "card";
  const header = document.createElement("div");
  header.className = "card-header";
  const name = document.createElement("span");
  name.className = "model-id";
  name.textContent = model;
  const dot = document.createElement("span");
  dot.className = "state-dot";
  const status = document.createElement("span");
  status.className = "status";
  const statusWord = document.createElement("span");
  statusWord.setAttribute("aria-live", "polite");
  const statusTime = document.createElement("span");
  status.append(statusWord, statusTime);
  header.append(name, dot, status);
  // 2px shimmer line under the header, shown by CSS while working.
  const shimmer = document.createElement("div");
  shimmer.className = "card-shimmer";
  const metrics = document.createElement("div");
  metrics.className = "metrics";
  const ttft = metricCell("ttft", "ttft");
  const total = metricCell("total", "total");
  const tok = metricCell("tok", "tok i/o");
  const cost = metricCell("cost", "cost");
  metrics.append(ttft.cell, total.cell, tok.cell, cost.cell);
  const body = document.createElement("div");
  body.className = "body";
  const tools = document.createElement("div");
  tools.className = "card-tools";
  card.append(header, shimmer, metrics, body, tools);
  resultsEl.append(card);
  const ui = {
    card, name, statusWord, statusTime, tools, body,
    metrics: { ttft: ttft.v, total: total.v, tok: tok.v, cost: cost.v },
  };
  setState(ui, "working");
  return ui;
}

// Restores a card to its initial working state so a rerun flows
// through the exact same streaming path as a first attempt. Clearing
// the tools also drops the failed attempt's diff, copy, fold and
// rerun controls.
function resetColumn(ui) {
  setState(ui, "working");
  ui.tools.replaceChildren();
  for (const v of Object.values(ui.metrics)) clearMetric(v);
  ui.body.className = "body";
  ui.body.replaceChildren();
}

function toolButton(label) {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "tool";
  btn.textContent = label;
  return btn;
}

// ---- Elapsed indicator. One shared interval serves every running
// ---- card and race row, so five racing models cost one timer, not
// ---- five. The counter exists because extended-budget reasoning sits
// ---- silent for minutes and a frozen "thinking" reads as hung; it
// ---- disappears at the first token.
const tickers = new Map();
let tickerTimer = null;

function renderTick(ui, entry) {
  const secs = Math.floor((performance.now() - entry.start) / 1000);
  ui.statusTime.textContent = " · " + secs + "s";
  if (race !== null && entry.model != null) {
    const row = race.rows.get(entry.model);
    if (row && row.status === "working") row.val.textContent = secs + " s";
  }
}

function startTicker(ui, model) {
  const entry = { start: performance.now(), model: model };
  tickers.set(ui, entry);
  renderTick(ui, entry);
  if (tickerTimer === null) {
    tickerTimer = setInterval(() => {
      for (const [u, e] of tickers) renderTick(u, e);
    }, 1000);
  }
}

function stopTicker(ui) {
  if (!tickers.delete(ui)) return;
  if (tickers.size === 0 && tickerTimer !== null) {
    clearInterval(tickerTimer);
    tickerTimer = null;
  }
}

// Rerun is a human clicking, never automatic: that click is the
// honesty boundary between recovering from a transient failure and
// hiding one. The failed run is already persisted by the time this
// button exists; the rerun lands as a second run in the same group,
// so History keeps both the failure and the retry. Only live runs
// get the control, since rerunning history would be a new experiment
// wearing an old label.
function addRerun(ui, retry) {
  const btn = toolButton("rerun");
  btn.classList.add("rerun-btn");
  btn.title = "Retry this model in place; the failed run stays in history";
  btn.addEventListener("click", () => {
    // The reset below removes the button, but disable first so a
    // double click cannot start two reruns of the same column.
    btn.disabled = true;
    resetColumn(ui);
    // Same budget as the run being retried, not the current control
    // value: a rerun is a second sample of the same experiment.
    runOne(retry.prompt, retry.model, retry.promptId, retry.groupId, retry.budget, ui);
  });
  ui.tools.append(btn);
}

function fmtCost(c) {
  // Exponential for the typical sub-cent run ($3.1e-5); plain decimals
  // once a run costs enough for them to be readable.
  return "$" + (c < 0.01 ? c.toExponential(1) : c.toFixed(3));
}

function fillMetrics(ui, result) {
  if (result.ttft_ms != null) {
    setMetric(ui.metrics.ttft, String(Math.round(result.ttft_ms)), "ms");
  }
  if (result.latency_ms != null) {
    if (result.latency_ms < 1000) {
      setMetric(ui.metrics.total, String(Math.round(result.latency_ms)), "ms");
    } else {
      setMetric(ui.metrics.total, (result.latency_ms / 1000).toFixed(2), "s");
    }
  }
  if (result.prompt_tokens != null && result.completion_tokens != null) {
    setMetric(ui.metrics.tok, result.prompt_tokens + "/" + result.completion_tokens, null);
  }
  if (result.cost_usd != null) {
    setMetric(ui.metrics.cost, fmtCost(result.cost_usd), null);
  }
}

// A result may carry BOTH partial text and an error (stream died
// partway); the error box renders below whatever text arrived, via a
// text-only node like everything else.
function applyError(ui, error) {
  if (error == null) return;
  const msg = document.createElement("div");
  msg.className = "error-msg";
  // Visually separate the error from partial text when there is some.
  if (ui.body.textContent !== "") msg.classList.add("after-text");
  msg.textContent = error;
  ui.body.append(msg);
}

function addCopy(ui, text) {
  const btn = toolButton("copy");
  let timer = null;
  btn.addEventListener("click", async () => {
    // The confirmation is a fixed literal set via textContent; the
    // copied payload itself never touches the DOM here.
    let label = "copied";
    try {
      await navigator.clipboard.writeText(text);
    } catch (err) {
      label = "copy failed";
    }
    btn.textContent = label;
    if (timer !== null) clearTimeout(timer);
    timer = setTimeout(() => {
      btn.textContent = "copy";
      timer = null;
    }, 1200);
  });
  ui.tools.append(btn);
}

function addFold(ui) {
  const btn = toolButton("fold");
  btn.setAttribute("aria-expanded", "true");
  btn.addEventListener("click", () => {
    const folded = ui.body.classList.toggle("folded");
    // The unfold affordance lives in the same control: "show all"
    // where the fold used to be.
    btn.textContent = folded ? "show all" : "fold";
    btn.setAttribute("aria-expanded", String(!folded));
  });
  ui.tools.append(btn);
}

// The one completion renderer. Live streams and history replay both
// land here, so the safety rules (textContent only) and the contract
// (text or error, possibly both) are enforced in a single place.
function completeColumn(ui, result, sourceLabel, opts) {
  stopTicker(ui);
  ui.body.classList.remove("loading");
  if (!opts.streamed) {
    // textContent on purpose: model output is untrusted and must never
    // be parsed as HTML. pre-wrap in CSS keeps line breaks readable.
    ui.body.textContent = result.response_text != null ? result.response_text : "";
  }
  fillMetrics(ui, result);
  const error = "shownError" in opts ? opts.shownError : result.error;
  applyError(ui, error);
  setState(ui, error != null ? "error" : "done");
  // Rerun leads the action row so the recovery control is where the
  // eye lands first on a failed card.
  if (opts.retry) addRerun(ui, opts.retry);
  if (result.response_text != null) {
    addCopy(ui, result.response_text);
    addFold(ui);
  }
  registerDiffable(ui, result, sourceLabel);
  // Budget note on history replay only, never live columns: two
  // attempts at different budgets are different experiments, and the
  // replay must say which is which. Pre-budget rows carry null and
  // show nothing.
  if (opts.budgetBadge && result.max_tokens != null) {
    const note = document.createElement("span");
    note.className = "budget-note";
    note.textContent = "budget " + result.max_tokens;
    ui.tools.append(note);
  }
}

function fillColumn(ui, result, sourceLabel) {
  completeColumn(ui, result, sourceLabel, {
    streamed: false,
    budgetBadge: true,
    retry: null,
  });
}

// ---- Diff view. Pure functions first (tokenize, lcs, render) so a JS
// ---- harness could test them later; DOM wiring below.

// Past this many word tokens the O(n*m) LCS table would freeze the
// tab, so the panel shows a notice instead.
const DIFF_TOKEN_LIMIT = 4000;

function tokenizeDiff(text) {
  // Capturing split keeps whitespace; each token is a word plus its
  // trailing whitespace so reconstruction preserves original spacing
  // and line breaks. The LCS compares the word alone (key), so a moved
  // line break does not mark the word itself as changed.
  const parts = text.split(/(\s+)/);
  const tokens = [];
  for (const part of parts) {
    if (part === "") continue;
    if (/^\s+$/.test(part) && tokens.length > 0) {
      tokens[tokens.length - 1].raw += part;
    } else if (/^\s+$/.test(part)) {
      tokens.push({ raw: part, key: "" });
    } else {
      tokens.push({ raw: part, key: part });
    }
  }
  return tokens;
}

function diffTokens(a, b) {
  // Classic LCS table with backtrack. O(n*m) is fine at bench scale
  // behind DIFF_TOKEN_LIMIT, and forty lines of understandable code
  // beat an optimal but opaque algorithm in a hand-maintained file.
  const n = a.length;
  const m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Uint16Array(m + 1));
  for (let i = 1; i <= n; i += 1) {
    for (let j = 1; j <= m; j += 1) {
      dp[i][j] = a[i - 1].key === b[j - 1].key
        ? dp[i - 1][j - 1] + 1
        : Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }
  const ops = [];
  let i = n;
  let j = m;
  while (i > 0 && j > 0) {
    if (a[i - 1].key === b[j - 1].key) {
      // Common text takes B's spacing so the merged view flows like
      // the newer response.
      ops.push({ op: "same", raw: b[j - 1].raw });
      i -= 1;
      j -= 1;
    } else if (dp[i - 1][j] >= dp[i][j - 1]) {
      ops.push({ op: "del", raw: a[i - 1].raw });
      i -= 1;
    } else {
      ops.push({ op: "ins", raw: b[j - 1].raw });
      j -= 1;
    }
  }
  while (i > 0) { ops.push({ op: "del", raw: a[i - 1].raw }); i -= 1; }
  while (j > 0) { ops.push({ op: "ins", raw: b[j - 1].raw }); j -= 1; }
  return ops.reverse();
}

function renderDiff(ops, container) {
  container.replaceChildren();
  // Adjacent tokens with the same op merge into one node: fewer DOM
  // nodes and the del/ins tint reads as one span per changed region.
  let run = null;
  function flush() {
    if (run === null) return;
    if (run.op === "same") {
      container.append(document.createTextNode(run.text));
    } else {
      // createElement plus textContent only: model output stays
      // untrusted in diff form, exactly as in the cards.
      const el = document.createElement(run.op === "del" ? "del" : "ins");
      el.textContent = run.text;
      container.append(el);
    }
    run = null;
  }
  for (const o of ops) {
    if (run !== null && run.op === o.op) {
      run.text += o.raw;
    } else {
      flush();
      run = { op: o.op, text: o.raw };
    }
  }
  flush();
}

const diffPanel = document.getElementById("diff-panel");
const diffTitle = document.getElementById("diff-title");
const diffBody = document.getElementById("diff-body");
// Armed side of a pending diff. Holds the result data, not just the
// element: history replay replaces the cards, and surviving that is
// what makes live-vs-historical diffs possible.
let armedDiff = null;

function closeDiffPanel() {
  diffPanel.hidden = true;
  diffTitle.textContent = "";
  diffBody.replaceChildren();
}

function setArmed(btn, on) {
  btn.classList.toggle("armed", on);
  btn.setAttribute("aria-pressed", String(on));
  // The armed side carries a filled marker: "diff ●".
  btn.textContent = (btn.dataset.base || "diff") + (on ? " ●" : "");
}

// Arming deliberately survives history replay (that is what makes
// live-vs-historical diffs possible), but not a new Run: its cards
// supersede the comparison the armed result came from, and a later
// toggle would silently diff against a vanished card.
function disarmDiff() {
  if (armedDiff !== null) {
    // The armed button may already be detached (replaced results);
    // clearing the state is harmless either way.
    setArmed(armedDiff.btn, false);
    armedDiff = null;
  }
}

function openDiff(a, b) {
  diffTitle.textContent = a.label + " ⇄ " + b.label;
  const ta = tokenizeDiff(a.result.response_text);
  const tb = tokenizeDiff(b.result.response_text);
  if (ta.length > DIFF_TOKEN_LIMIT || tb.length > DIFF_TOKEN_LIMIT) {
    diffBody.textContent = "responses too large to diff";
  } else {
    renderDiff(diffTokens(ta, tb), diffBody);
  }
  diffPanel.hidden = false;
}

function registerDiffable(ui, result, sourceLabel) {
  // Error-only cards have nothing to diff; partial text (the
  // both-text-and-error contract) is diffable and labeled as such.
  if (result.response_text == null || sourceLabel == null) return;
  const label = sourceLabel + (result.error != null ? " (partial)" : "");
  const btn = toolButton(result.error != null ? "diff (partial)" : "diff");
  btn.classList.add("diff-btn");
  btn.dataset.base = btn.textContent;
  btn.setAttribute("aria-pressed", "false");
  btn.addEventListener("click", () => {
    if (armedDiff !== null && armedDiff.btn === btn) {
      setArmed(btn, false);
      armedDiff = null;
      return;
    }
    if (armedDiff === null) {
      armedDiff = { btn: btn, result: result, label: label };
      setArmed(btn, true);
      return;
    }
    openDiff(armedDiff, { btn: btn, result: result, label: label });
    setArmed(armedDiff.btn, false);
    armedDiff = null;
  });
  ui.tools.append(btn);
}

document.getElementById("diff-close").addEventListener("click", closeDiffPanel);

async function runOne(prompt, model, promptId, groupId, budget, ui) {
  ui.body.classList.add("loading");
  ui.body.textContent = "awaiting first token";
  startTicker(ui, model);
  raceRestart(model);
  // Deltas append to a dedicated text node: appendData is a pure text
  // API, so the no-HTML injection rule holds for every chunk, and the
  // node survives into the error state if the stream dies partway.
  let textNode = null;
  let finished = false;
  function appendDelta(text) {
    if (textNode === null) {
      // First token: the thinking counter has done its job, and the
      // client-side TTFT drives the card metric and race bar until the
      // server's authoritative number arrives with the done event.
      const entry = tickers.get(ui);
      if (entry) {
        const ttftMs = performance.now() - entry.start;
        setMetric(ui.metrics.ttft, String(Math.round(ttftMs)), "ms");
        raceTtft(model, ttftMs);
      }
      stopTicker(ui);
      ui.statusTime.textContent = "";
      ui.body.classList.remove("loading");
      ui.body.textContent = "";
      textNode = document.createTextNode("");
      ui.body.append(textNode);
    }
    textNode.appendData(text);
  }
  function finish(result) {
    // Idempotence guard: a connection that dies after the done event
    // was rendered must not stack a second set of metrics or errors.
    if (finished) return;
    finished = true;
    if (result.error != null) {
      raceError(model);
    } else {
      raceDone(model, result.ttft_ms);
    }
    // Session stats: spend counts whatever was billed, failures
    // included; mean TTFT counts completed requests only.
    if (result.cost_usd != null) sessionStats.spend += result.cost_usd;
    if (result.error == null && result.ttft_ms != null) {
      sessionStats.ttftSum += result.ttft_ms;
      sessionStats.ttftN += 1;
    }
    renderStats();
    // Presentation only, never persisted: the stored error stays the
    // server's exact words. The extended budget is the one knob the
    // user can turn when reasoning burned the whole standard budget,
    // so say so right where the failure is reported.
    let shownError = result.error;
    if (
      shownError != null &&
      budget === "standard" &&
      shownError.includes("finish_reason: length")
    ) {
      shownError += "; try extended budget";
    }
    completeColumn(ui, result, model + " (live)", {
      streamed: textNode !== null,
      shownError: shownError,
      budgetBadge: false,
      // Only this streaming path offers a rerun; historical replays go
      // through fillColumn and never get one.
      retry: result.error != null
        ? { prompt, model, promptId, groupId, budget }
        : null,
    });
  }

  try {
    const resp = await fetch("/compare/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        model: model,
        prompt_id: promptId,
        group_id: groupId,
        budget: budget,
      }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const frame = buf.slice(0, sep);
        buf = buf.slice(sep + 2);
        const line = frame.split("\n").find(l => l.startsWith("data:"));
        if (!line) continue;
        const event = JSON.parse(line.slice(5));
        if (event.type === "delta") {
          appendDelta(event.text);
        } else if (event.type === "done") {
          finish(event.result);
        }
      }
    }
    if (!finished) throw new Error("stream ended unexpectedly");
  } catch (err) {
    // Network death mid-stream lands here; partial text stays visible
    // through the same error rendering as a server-reported failure.
    // The streamed text is folded into the synthetic result so the
    // card stays diffable on its partial text.
    finish({
      error: "request failed: " + err.message,
      response_text: textNode !== null ? textNode.data : null,
    });
  }
}

runBtn.addEventListener("click", async () => {
  const prompt = promptEl.value;
  const promptId = selectedPromptId;
  const budget = budgetValue;
  const models = checkedModels();
  resultsEl.replaceChildren();
  runLabelEl.textContent = "";
  // A new comparison replaces the cards a shown diff came from.
  closeDiffPanel();
  disarmDiff();
  running = true;
  updateRunState();
  sessionStats.runs += 1;
  renderStats();
  // One request per model instead of one batch: /compare returns only when
  // its slowest model finishes, and the bench exists to watch fast models
  // land first. Cards are created up front so order tracks the chip
  // list, not response arrival.
  raceInit(models);
  const columns = models.map(makeColumn);
  // One group per Run click so the N per-model requests land as one
  // history entry. A failed create degrades to ungrouped runs rather
  // than blocking: grouping is bookkeeping, the comparison is the
  // product.
  let groupId = null;
  try {
    const resp = await fetch("/groups", { method: "POST" });
    if (resp.ok) groupId = (await resp.json()).id;
  } catch (err) {
    // Deliberately swallowed; see above.
  }
  await Promise.allSettled(
    models.map((model, i) =>
      runOne(prompt, model, promptId, groupId, budget, columns[i])
    )
  );
  running = false;
  updateRunState();
});

// ---- History. Loads on expand rather than page load: it is the
// ---- rarely used half of the page and a stale list is worse than a
// ---- slightly later one.
historyEl.addEventListener("toggle", () => {
  if (historyEl.open) loadHistory();
});

// Client-side only: the filter narrows what is already on screen, it
// never refetches. Matches the visible prompt text and model ids.
historyFilter.addEventListener("input", applyHistoryFilter);
function applyHistoryFilter() {
  const q = historyFilter.value.trim().toLowerCase();
  for (const row of historyList.querySelectorAll(".hrow")) {
    row.hidden = q !== "" && !row.dataset.hay.includes(q);
  }
}

// Explicit rather than relying on the server default, so the "newest
// N" note in the header cannot drift out of sync with what was asked.
const HISTORY_LIMIT = 100;

async function loadHistory() {
  historyList.replaceChildren();
  historyNote.textContent = "";
  let data;
  try {
    const resp = await fetch("/runs?limit=" + HISTORY_LIMIT);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (err) {
    historyList.textContent = "failed to load history: " + err.message;
    return;
  }
  if (data.runs.length === 0) {
    historyList.textContent = "no runs yet";
    return;
  }
  for (const run of data.runs) {
    // Buttons, not divs: rows must be reachable by keyboard.
    const row = document.createElement("button");
    row.type = "button";
    row.className = "hrow";
    // The filter matches model ids even though rows only show a count.
    row.dataset.hay = (run.prompt_text + " " + run.models.join(" ")).toLowerCase();
    const time = document.createElement("span");
    time.className = "htime";
    // Labeled like the replay banner: an unlabeled timestamp reads as
    // local time, and these are UTC.
    time.textContent = run.created_at.slice(0, 19).replace("T", " ") + " UTC";
    const text = document.createElement("span");
    text.className = "hprompt";
    text.textContent = run.prompt_text;
    const count = document.createElement("span");
    count.className = "hcount";
    count.textContent =
      run.models.length + (run.models.length === 1 ? " model" : " models");
    row.append(time, text, count);
    row.title = run.models.join(", ");
    row.addEventListener("click", () =>
      run.type === "group" ? showGroup(run.id) : showRun(run.id)
    );
    historyList.append(row);
  }
  // A full page means there may be older entries beyond it; say so
  // rather than letting truncation read as "this is everything".
  if (data.runs.length === HISTORY_LIMIT) {
    historyNote.textContent =
      "newest " + HISTORY_LIMIT + " · older stays in bench.db";
  }
  // A filter typed before this refresh still applies to the new rows.
  applyHistoryFilter();
}

async function showGroup(groupId) {
  let group;
  try {
    const resp = await fetch("/groups/" + groupId);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    group = await resp.json();
  } catch (err) {
    runLabelEl.textContent =
      "failed to load comparison #" + groupId + ": " + err.message;
    return;
  }
  resultsEl.replaceChildren();
  // The race strip visualizes the live run only; a replay has no race.
  hideRace();
  // The panel would otherwise keep showing a diff of cards that no
  // longer exist; the ARMED side stays, by design, for cross-replay
  // diffing.
  closeDiffPanel();
  runLabelEl.textContent =
    "Historical comparison #" + group.id + " from " +
    group.created_at.slice(0, 19).replace("T", " ") + " UTC";
  // Cards in chip (lineup) order, matching the live layout. Runs
  // persist in completion order, so run order alone would shuffle
  // cards between replays; models no longer in the lineup keep run
  // order at the end.
  const results = group.runs.flatMap(r => r.results);
  const rank = m => {
    const i = lineup.indexOf(m);
    return i === -1 ? lineup.length : i;
  };
  results.sort((a, b) => rank(a.model) - rank(b.model));
  for (const result of results) {
    fillColumn(
      makeColumn(result.model), result,
      result.model + ", comparison #" + group.id
    );
  }
  window.scrollTo({ top: 0 });
}

async function showRun(runId) {
  let run;
  try {
    const resp = await fetch("/runs/" + runId);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    run = await resp.json();
  } catch (err) {
    runLabelEl.textContent = "failed to load run #" + runId + ": " + err.message;
    return;
  }
  // Same completion renderer as a live run so the textContent and
  // null-content guarantees hold for stored data too.
  resultsEl.replaceChildren();
  hideRace();
  closeDiffPanel();
  runLabelEl.textContent =
    "Historical run #" + run.id + " from " +
    run.created_at.slice(0, 19).replace("T", " ") + " UTC";
  for (const result of run.results) {
    fillColumn(makeColumn(result.model), result, result.model + ", run #" + run.id);
  }
  window.scrollTo({ top: 0 });
}
</script>
